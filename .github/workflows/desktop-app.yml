name: Build desktop app

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Notes Sync (macOS universal)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'app/src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Build universal .dmg
        working-directory: app/src-tauri
        run: cargo tauri build --target universal-apple-darwin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: notes-sync-macos
          path: app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Draft release
        if: startsWith(github.ref, 'refs/tags/app-v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: 'Notes Sync ${{ github.ref_name }}'
          files: app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          generate_release_notes: true
          body: |
            Notes Sync — menubar app that mirrors your Urbit notes to a local folder of `.md` files.

            > The .dmg is **unsigned** for now. On first launch, macOS will refuse to open it with a Gatekeeper warning. Right-click the app → Open → Open anyway.
