<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --border-item: #1a1a1a;
    --text: #e8e8e8;
    --text-muted: #666;
    --accent: #7c6af7;
    --accent-hover: #9080ff;
    --danger: #e05c5c;
    --success: #4caf82;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    --editor-font-size: 16px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    inset: 0;
  }

  /* ── sidebar footer (brand only) ── */
  .sidebar-brand {
    margin-top: 12px;
    padding: 4px 14px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  /* Keep name + version baseline-aligned even when fonts differ, without
     letting the tall mobile hamburger warp the outer flex line's baseline. */
  .brand-text {
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }
  /* brand-icon now uses the default .icon opacity */
  .sidebar-brand .brand-name { font-size: 13px; font-weight: 600; }

  /* ── connection state label ── */
  #conn-label.reconnecting { color: #d4a72c; }
  #conn-label.disconnected { color: var(--danger); }

  /* Connectivity badge — lives inside the editor toolbar */
  .conn-badge {
    display: none;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    padding: 0 8px;
    color: #d4a72c;
  }
  .conn-badge.visible { display: inline-flex; align-items: center; }
  .conn-badge.offline { color: var(--danger); }
  .conn-badge::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    background: currentColor;
  }

  /* ── layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── column resizers ── */
  .resizer {
    flex-shrink: 0;
    width: 3px;
    margin-left: -1px;       /* center the 3px hit area over the 1px border */
    cursor: col-resize;
    background: transparent;
    transition: background 0.15s;
    position: relative;
    z-index: 5;
    user-select: none;
    touch-action: none;
  }
  .resizer:hover,
  .resizer.dragging { background: rgba(124,106,247,0.4); }
  body.resizing { cursor: col-resize; user-select: none; }

  /* ── sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }
  .sidebar-section {
    height: 41px;
    padding: 0 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-section-actions { display: flex; align-items: center; gap: 2px; }

  /* Collapsed sidebar — hide sidebar and its resizer, reveal expand button */
  #sidebar-expand-btn, #sidebar-switcher-btn, #sidebar-search-btn { display: none; }
  body.sidebar-collapsed .sidebar { display: none; }
  body.sidebar-collapsed .resizer[data-target="sidebar"] { display: none; }
  body.sidebar-collapsed #sidebar-expand-btn,
  body.sidebar-collapsed #sidebar-search-btn,
  body.sidebar-collapsed #sidebar-switcher-btn { display: inline-flex; }
  .sidebar-list { flex: 1; overflow-y: auto; padding-bottom: 8px; min-height: 0; }
  .nb-item {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px 6px;
    padding: 6px 6px;
    cursor: pointer;
    border-radius: 4px;
    margin: 1px 4px;
    font-size: 13px;
    transition: background 0.1s;
    user-select: none;
  }
  .nb-item:hover { background: var(--surface2); }
  .nb-item.active { background: var(--accent); color: #fff; }
  .nb-item .nb-icon { flex-shrink: 0; display: flex; align-items: center; }
  .nb-item .nb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nb-item .nb-flag {
    width: 100%;
    font-size: 10px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-left: 22px;
  }
  .nb-item .nb-flag:hover { text-decoration: underline; }
  .nb-item.active .nb-flag { color: rgba(255,255,255,0.6); }

  /* ── sidebar bottom actions ── */
  .sidebar-actions {
    border-top: 1px solid var(--border);
    padding: 4px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .sidebar-action {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted);
    font-size: 12px; font-family: var(--font);
    padding: 6px 10px; border-radius: 4px;
    text-align: left;
  }
  .sidebar-action:hover { background: var(--surface2); color: var(--text); }
  .sidebar-action[disabled] { opacity: 0.4; cursor: default; }
  .sidebar-action[disabled]:hover { background: none; color: var(--text-muted); }
  .sidebar-version {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1;
    color: var(--text-muted);
    opacity: 0.6;
    user-select: none;
    margin-left: auto;
  }

  /* mobile hamburger for add/import actions */
  .sidebar-brand .sidebar-menu-btn { margin-left: auto; display: none; }
  body.sidebar-menu-open .sidebar-brand .sidebar-menu-btn {
    background: var(--surface2);
    color: var(--text);
  }
  body.sidebar-menu-open .sidebar-brand .sidebar-menu-btn .icon { opacity: 0.95; }

  /* ── SVG icons ── */
  .icon {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
    opacity: 0.65;
  }
  .icon-btn:hover .icon { opacity: 0.95; }

  /* ── icon button ── */
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px; border-radius: 3px;
    line-height: 1; transition: color 0.15s, background 0.15s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }

  /* ── font-size toolbar buttons (A- / A+) ── */
  .font-size-btn { font-family: var(--font); font-weight: 600; }
  .font-size-btn .fs-glyph {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; line-height: 1;
    opacity: 0.65;
  }
  .font-size-btn:hover .fs-glyph { opacity: 0.95; }
  .font-size-btn .fs-glyph-sm { font-size: 11px; }
  .font-size-btn .fs-glyph-lg { font-size: 15px; }

  /* ── notes list panel ── */
  .notes-panel {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .notes-panel-header {
    height: 41px;
    padding: 0 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  #folder-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panel-actions { display: flex; align-items: center; gap: 6px; }
  .notes-panel-footer { display: none; }
  .nb-lock { width: 12px; height: 12px; color: var(--text-muted); flex-shrink: 0; margin-left: 2px; }
  .nb-item.active .nb-lock { color: rgba(255,255,255,0.8); }
  .notes-list { flex: 1; overflow-y: auto; }
  .item-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-item);
    transition: background 0.1s;
  }
  .item-row .item-icon { margin-top: 1px; }
  .item-row:hover { background: var(--surface2); }
  .item-row.active { background: rgba(124,106,247,0.15); border-left: 2px solid var(--accent); padding-left: 10px; }
  .item-icon { flex-shrink: 0; line-height: 1; display: flex; align-items: center; }
  .item-body { flex: 1; min-width: 0; }
  .item-title-row { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .item-title { flex: 1; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-date { font-size: 11px; color: var(--text-muted); flex-shrink: 0; opacity: 0.7; }
  .item-preview {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-row.is-folder .item-title { font-weight: 500; }
  .item-chevron {
    flex-shrink: 0;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    margin-top: 1px;
  }
  .item-chevron .icon { width: 14px; height: 14px; }
  .item-row.is-folder:hover .item-chevron .icon { opacity: 0.95; }

  /* Folder icon swaps to an ellipsis action on row hover */
  .item-row.is-folder .item-icon {
    border-radius: 3px;
    transition: background 0.15s;
  }
  .item-row.is-folder .item-icon .ellipsis-glyph { display: none; }
  .item-row.is-folder:hover .item-icon { cursor: pointer; }
  .item-row.is-folder:hover .item-icon .folder-glyph { display: none; }
  .item-row.is-folder:hover .item-icon .ellipsis-glyph { display: inline-flex; }
  .item-row.is-folder:hover .item-icon:hover { background: var(--surface); }
  .item-row.is-folder .item-icon.menu-open .folder-glyph { display: none; }
  .item-row.is-folder .item-icon.menu-open .ellipsis-glyph { display: inline-flex; }
  .item-row.is-folder .item-icon.menu-open { background: var(--surface); }

  /* Folder action popover (rename / delete) */
  .folder-action-menu {
    display: none;
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    min-width: 180px;
    white-space: nowrap;
    z-index: 150;
    padding: 4px 0;
  }
  .folder-action-menu.open { display: block; }
  .folder-action-menu button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: none; border: none; cursor: pointer;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    font-family: var(--font);
  }
  .folder-action-menu button:hover { background: var(--surface2); }
  .folder-action-menu button.danger { color: var(--danger); }
  .folder-action-menu button.danger:hover { background: rgba(224,92,92,0.1); }
  .folder-action-menu .menu-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; flex-shrink: 0;
    opacity: 0.7;
  }
  .folder-action-menu button:hover .menu-icon { opacity: 0.95; }
  .empty-state { padding: 24px 12px; text-align: center; color: var(--text-muted); font-size: 12px; }
  .folder-up-btn { color: var(--text-muted); }
  .folder-up-btn:hover { color: var(--text); }

  /* ── editor ── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .editor-toolbar {
    height: 41px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .editor-toolbar .spacer { flex: 1; }

  /* Floating bottom-right toolbar on desktop */
  @media (min-width: 641px) {
    .editor-toolbar {
      position: fixed;
      bottom: 0;
      right: 0;
      height: auto;
      width: auto;
      padding: 4px 6px;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: 0;
      border-bottom: 0;
      border-top-left-radius: 8px;
      z-index: 50;
    }
    .editor-toolbar .spacer,
    .editor-toolbar .back-btn { display: none; }
    .editor-toolbar .save-status { padding: 0 4px; }
    .editor-toolbar .note-rev { padding: 0 4px; }
    .editor-toolbar .note-breadcrumb {
      font-family: var(--font);
      font-size: 11px;
      color: var(--text-muted);
      max-width: 320px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      direction: rtl;
      text-align: left;
      unicode-bidi: plaintext;
      padding: 0 6px;
    }
    .editor-toolbar .overflow-menu {
      top: auto;
      bottom: 100%;
      margin-top: 0;
      margin-bottom: 6px;
    }
  }
  #note-title-input {
    display: block;
    width: 100%;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: calc(var(--editor-font-size) * 1.875);
    font-weight: 700;
    line-height: 1.2;
    padding: 0;
    margin: 0 0 24px 0;
    box-sizing: border-box;
  }
  #note-title-input::placeholder { color: var(--text-muted); font-weight: 700; }
  .save-btn {
    background: var(--accent); border: none; color: #fff;
    padding: 5px 12px; border-radius: 5px; cursor: pointer;
    font-size: 12px; font-weight: 600;
    transition: background 0.15s, opacity 0.15s;
  }
  .save-btn:hover { background: var(--accent-hover); }
  .save-btn:disabled { opacity: 0.4; cursor: default; }
  .save-status { font-size: 11px; color: var(--text-muted); }
  .note-rev { font-family: var(--mono); font-size: 11px; color: var(--text-muted); opacity: 0.6; user-select: none; }

  /* ── conflict / save-error banner ── */
  .conflict-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(212,167,44,0.12);
    border-bottom: 1px solid rgba(212,167,44,0.35);
    font-size: 12px;
    color: #d4a72c;
    flex-shrink: 0;
  }
  .conflict-banner .conflict-msg { flex: 1; }
  .conflict-banner .btn { padding: 4px 10px; font-size: 12px; }
  .conflict-banner.error {
    background: rgba(224,92,92,0.1);
    border-bottom-color: rgba(224,92,92,0.35);
    color: var(--danger);
  }

  /* ── overflow menu ── */
  .overflow-wrap { position: relative; }
  .overflow-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    min-width: 180px;
    white-space: nowrap;
    z-index: 50;
    padding: 4px 0;
  }
  .overflow-menu.open { display: block; }
  .overflow-menu button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
  }
  .overflow-menu button:hover { background: var(--surface2); }
  .overflow-menu button.danger { color: var(--danger); }
  .overflow-menu button.danger:hover { background: rgba(224,92,92,0.1); }
  .overflow-menu .menu-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .overflow-menu button:hover .menu-icon { opacity: 0.95; }
  .overflow-menu .menu-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 6px;
  }

  .editor-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    background: var(--bg);
  }
  .editor-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 56px 96px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 641px) and (max-width: 980px) {
    .editor-wrap { padding: 48px 24px 96px; }
  }
  #editor {
    display: block;
    width: 100%;
    resize: none;
    background: transparent;
    color: var(--text);
    border: none;
    outline: none;
    padding: 0;
    margin: 0;
    font-family: var(--mono);
    font-size: var(--editor-font-size);
    line-height: 1.7;
    min-height: 60vh;
    overflow: hidden;
    box-sizing: border-box;
  }
  #editor::placeholder { color: var(--text-muted); font-family: var(--font); }

  #preview {
    padding: 0;
    font-size: var(--editor-font-size);
    line-height: 1.7;
    min-height: 60vh;
  }

  /* ── wiki-links ── */
  .wiki-link {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed rgba(124,106,247,0.35);
    padding-bottom: 1px;
    cursor: pointer;
  }
  .wiki-link:hover {
    border-bottom-color: var(--accent);
    background: rgba(124,106,247,0.08);
  }
  .wiki-link.unresolved {
    color: var(--text-muted);
    border-bottom-color: rgba(136,136,136,0.4);
  }
  .wiki-link.unresolved:hover {
    color: var(--text);
    background: rgba(136,136,136,0.1);
  }

  /* ── backlinks section ── */
  .backlinks-section {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .backlinks-section.position-top {
    margin-top: 0;
    margin-bottom: 40px;
    padding-top: 0;
    padding-bottom: 20px;
    border-top: none;
    border-bottom: 1px solid var(--border);
  }
  .backlinks-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .backlink-item {
    display: block;
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border-item);
  }
  .backlink-item:last-child { border-bottom: none; }
  .backlink-item:hover .backlink-title { color: var(--accent); }
  .backlink-title {
    font-size: 13.5px;
    color: var(--text);
    margin-bottom: 2px;
  }
  .backlink-path {
    font-size: 11.5px;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  .menu-check {
    font-family: var(--font);
    font-size: 13px;
    color: var(--accent);
    opacity: 1 !important;
  }

  /* ── wiki-link autocomplete popover ── */
  .wiki-autocomplete {
    display: none;
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    min-width: 220px;
    max-width: 360px;
    max-height: 240px;
    overflow-y: auto;
    z-index: 180;
    padding: 4px 0;
    font-family: var(--font);
  }
  .wiki-autocomplete.open { display: block; }
  .wiki-autocomplete-item {
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wiki-autocomplete-item:hover,
  .wiki-autocomplete-item.selected { background: var(--surface2); }
  .wiki-autocomplete-item .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 8px;
    font-family: var(--mono);
  }
  .wiki-autocomplete-empty {
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .wiki-autocomplete-empty kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text);
  }
  #preview h1 { font-size: 1.8em; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  #preview h2 { font-size: 1.4em; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  #preview h3 { font-size: 1.15em; margin: 0.5em 0 0.3em; }
  #preview h4, #preview h5, #preview h6 { font-size: 1em; margin: 0.4em 0 0.2em; }
  #preview p { margin: 0.5em 0; }
  #preview pre { background: var(--surface); padding: 12px 16px; border-radius: 6px; overflow-x: auto; margin: 0.6em 0; }
  #preview code { font-family: var(--mono); font-size: 0.9em; }
  #preview :not(pre) > code { background: var(--surface2); padding: 2px 5px; border-radius: 3px; }
  #preview blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text-muted); margin: 0.5em 0; }
  #preview ul, #preview ol { padding-left: 1.5em; margin: 0.4em 0; }
  #preview li { margin: 0.15em 0; }
  #preview li > input[type="checkbox"] { margin-right: 0.4em; }
  #preview a { color: var(--accent); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
  #preview img { max-width: 100%; border-radius: 6px; }
  #preview table { border-collapse: collapse; margin: 0.6em 0; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 6px 12px; }
  #preview th { background: var(--surface); }

  /* ── modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    width: 320px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .modal h3 { font-size: 14px; margin-bottom: 14px; }
  .modal input, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 5px;
    font-size: 13px; font-family: var(--font); outline: none;
    margin-bottom: 12px;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .modal-choice {
    display: flex; flex-direction: column; gap: 2px;
    padding: 10px 12px; border-radius: 6px;
    background: var(--bg); border: 1px solid var(--border);
    cursor: pointer; text-align: left; color: var(--text);
  }
  .modal-choice:hover { border-color: var(--accent); }
  .modal-choice-title { font-size: 13px; font-weight: 500; }
  .modal-choice-desc { font-size: 11px; color: var(--text-muted); }
  .btn { padding: 6px 14px; border-radius: 5px; font-size: 13px; cursor: pointer; border: none; font-family: var(--font); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text-muted); }

  /* ── quick switcher ── */
  .switcher-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    z-index: 300;
    padding-top: 12vh;
    justify-content: center;
    align-items: flex-start;
  }
  .switcher-backdrop.open { display: flex; }
  .switcher {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    width: 560px;
    max-width: calc(100vw - 24px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .switcher-input-wrap {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .switcher-input-icon { width: 16px; height: 16px; opacity: 0.55; flex-shrink: 0; }
  .switcher-input-wrap input {
    flex: 1;
    background: none; border: none; outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    padding: 0;
    min-width: 0;
  }
  .switcher-input-wrap input::placeholder { color: var(--text-muted); }
  .switcher-results {
    max-height: 420px;
    overflow-y: auto;
    padding: 4px 0;
  }
  .switcher-result {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    cursor: pointer;
  }
  .switcher-result.selected { background: var(--surface2); }
  .switcher-result:hover { background: var(--surface2); }
  .switcher-result .result-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    flex-shrink: 0;
    opacity: 0.65;
  }
  .switcher-result-text { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .switcher-result-label {
    font-size: 13.5px;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .switcher-result-subtitle {
    font-size: 11.5px;
    color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .switcher-empty {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .switcher-hint {
    padding: 7px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .switcher-hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
    font-family: var(--mono);
    font-size: 10px;
    margin-right: 3px;
  }

  /* ── full-text search specifics (built on switcher classes) ── */
  .search-results { max-height: 460px; }
  .search-result {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-item);
  }
  .search-result:last-child { border-bottom: none; }
  .search-result.selected,
  .search-result:hover { background: var(--surface2); }
  .search-result-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .search-result-snippet {
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .search-result-snippet mark {
    background: rgba(124,106,247,0.28);
    color: var(--text);
    padding: 0 2px;
    border-radius: 2px;
  }
  .search-result-meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── connect panel ── */
  #connect-panel {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    flex-direction: column; gap: 12px;
  }
  #connect-panel h2 { font-size: 18px; margin-bottom: 4px; }
  #connect-panel p { font-size: 13px; color: var(--text-muted); }
  #connect-panel input {
    width: 300px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: 6px;
    font-size: 13px; font-family: var(--font); outline: none;
  }
  #connect-panel input:focus { border-color: var(--accent); }
  #connect-error { color: var(--danger); font-size: 12px; min-height: 16px; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── back button (hidden on desktop) ── */
  .back-btn {
    display: none;
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 13px; font-family: var(--font);
    padding: 2px 6px; margin-right: 4px; border-radius: 3px;
  }
  .back-btn:hover { background: var(--surface2); }

  /* ── zen mode ── */
  #zen-exit-btn {
    display: none;
    position: fixed;
    bottom: 0; right: 0;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: 0;
    border-bottom: 0;
    border-top-left-radius: 8px;
    padding: 10px 12px;
  }
  body.zen-mode .sidebar,
  body.zen-mode .notes-panel,
  body.zen-mode .resizer,
  body.zen-mode .editor-toolbar { display: none; }
  body.zen-mode .editor-panel { flex: 1; }
  body.zen-mode #zen-exit-btn { display: inline-flex; }

  /* ── mobile responsive ── */
  @media (max-width: 640px) {
    .back-btn { display: inline-flex; align-items: center; }

    .layout { position: relative; }
    .resizer { display: none; }
    body.sidebar-collapsed .sidebar { display: flex; }
    #sidebar-expand-btn,
    #sidebar-search-btn,
    #sidebar-switcher-btn { display: none !important; }
    .sidebar-section .icon-btn { display: none; }
    .sidebar, .notes-panel, .editor-panel {
      position: absolute;
      inset: 0;
      width: 100% !important;
      border: none !important;
      transition: transform 0.2s ease;
    }
    body.loading .sidebar,
    body.loading .notes-panel,
    body.loading .editor-panel { transition: none; }

    /* Default: sidebar visible, others off-screen right */
    .sidebar  { transform: translateX(0); z-index: 3; }
    .notes-panel { transform: translateX(100%); z-index: 2; }
    .editor-panel { transform: translateX(100%); z-index: 1; }

    /* View: notes-list */
    .layout[data-view="notes"] .sidebar { transform: translateX(-100%); }
    .layout[data-view="notes"] .notes-panel { transform: translateX(0); }
    .layout[data-view="notes"] .editor-panel { transform: translateX(100%); }

    /* View: editor */
    .layout[data-view="editor"] .sidebar { transform: translateX(-100%); }
    .layout[data-view="editor"] .notes-panel { transform: translateX(-100%); }
    .layout[data-view="editor"] .editor-panel { transform: translateX(0); }

    header h1 { font-size: 16px; }
    #ship-label { font-size: 12px; }

    /* Bigger tap targets across the board */
    .icon-btn { padding: 10px; }
    .icon-btn .icon { width: 20px; height: 20px; }
    .font-size-btn .fs-glyph { width: 20px; height: 20px; }
    .font-size-btn .fs-glyph-sm { font-size: 14px; }
    .font-size-btn .fs-glyph-lg { font-size: 19px; }
    .back-btn { font-size: 17px; padding: 10px 12px; }

    /* Hamburger toggles the existing actions cluster; it sits above the
       brand row in DOM order, so it naturally "pops out" upward. */
    .sidebar-actions { display: none; }
    body.sidebar-menu-open .sidebar-actions { display: block; }
    .sidebar-brand .sidebar-menu-btn { display: inline-flex; }
    /* Version sits next to brand name on mobile; hamburger takes the right */
    .sidebar-version { margin-left: 0; }

    .sidebar-section { font-size: 12px; height: 52px; padding: 0 10px; }
    .nb-item { font-size: 17px; padding: 12px 10px; }
    .nb-item .nb-icon .icon { width: 20px; height: 20px; }
    .sidebar-action { font-size: 15px; padding: 14px 12px; gap: 12px; }

    .notes-panel-header { height: 52px; font-size: 17px; padding: 0 8px; gap: 4px; }
    #folder-label { font-size: 17px; }
    .item-row { padding: 14px 12px; gap: 12px; }
    .item-icon .icon { width: 22px; height: 22px; }
    .item-title { font-size: 17px; }
    .item-date { font-size: 13px; }
    .item-preview { font-size: 14px; }
    .empty-state { font-size: 14px; }

    /* Contextual bottom footer on the notebook/notes view */
    .notes-panel-footer {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    /* Gear on the far left; create buttons on the right */
    .notes-panel-footer .panel-actions { flex: 1; }
    .notes-panel-footer #notebook-settings-wrap { margin-right: auto; }
    /* Gear menu pops upward and left-aligns with its button in the bottom footer */
    .notes-panel-footer #notebook-settings-menu {
      top: auto;
      bottom: 100%;
      left: 0;
      right: auto;
      margin-top: 0;
      margin-bottom: 4px;
    }
    /* On mobile the nb-flag is too small to hit reliably; route copy through the menu instead */
    .nb-item .nb-flag { pointer-events: none; }

    .editor-toolbar { height: 52px; padding: 0 8px; gap: 4px; }
    .save-status { font-size: 13px; }
    .note-rev { font-size: 12px; }
    .note-breadcrumb {
      font-family: var(--font);
      font-size: 12px;
      color: var(--text-muted);
      min-width: 0;
      max-width: 45vw;
      overflow: hidden;
      white-space: nowrap;
      padding: 0 2px;
    }
    .editor-wrap { padding: 24px 18px 72px; max-width: 100%; }
    #note-title-input { font-size: calc(var(--editor-font-size) * 1.5); margin-bottom: 16px; }
    #editor { line-height: 1.65; }

    .sidebar { overflow-y: auto; }
    .notes-panel { overflow-y: auto; }

    .modal { width: calc(100vw - 32px); max-width: 320px; }
  }
</style>
</head>

    <div class="sidebar-section">
      <span id="conn-label">Notebooks</span>

        <button class="icon-btn" title="Quick switch (⌘K)" onclick="openSwitcher()"><svg class="icon"><use href="#i-bolt"/></svg></button>
        <button class="icon-btn" title="Collapse sidebar" onclick="toggleSidebar()"><svg class="icon"><use href="#i-sidebar"/></svg></button>

    </div>
    <div class="sidebar-list" id="notebooks-list"></div>

      <button class="sidebar-action" onclick="openModal(&quot;add-notebook&quot;)"><svg class="icon"><use href="#i-plus"/></svg> Add notebook</button>
      <button class="sidebar-action" id="import-files-btn" onclick="triggerImport(false)"><svg class="icon"><use href="#i-download"/></svg> Import files</button>
      <button class="sidebar-action" id="import-folder-btn" onclick="triggerImport(true)"><svg class="icon"><use href="#i-folder-down"/></svg> Import folder</button>
      <button class="sidebar-action" onclick="openModal(&quot;desktop-sync&quot;)"><svg class="icon"><use href="#i-sync"/></svg> Desktop sync app</button>

    <div class="sidebar-brand">
      <svg class="icon brand-icon"><use href="#i-notebook"/></svg>

      <button class="icon-btn sidebar-menu-btn" onclick="toggleSidebarMenu()" title="More"><svg class="icon"><use href="#i-menu"/></svg></button>
    </div>
  </div>

  <div class="resizer" data-target="sidebar" aria-hidden="true"></div>

<script>
// ── Initial view (synchronous) ────────────────────────────────────────────
// Set data-view from the URL before first paint so mobile doesn't flash the
// wrong slide-panel. On desktop this attribute is ignored.
(function () {
  const m = location.pathname.match(/^\/notes\/nb\/([^/]+)\/([^/]+)(?:\/f\/\d+)?(?:\/n\/(\d+))?\/?$/);
  const layout = document.querySelector(".layout");
  if (!layout) return;
  if (m && m[3]) layout.setAttribute("data-view", "editor");
  else if (m) layout.setAttribute("data-view", "notes");
  else layout.setAttribute("data-view", "notebooks");
})();

// ── State ──────────────────────────────────────────────────────────────────
let BASE_URL = "";
let SHIP = "";
let channelId = "";
let eventSource = null;
let sseState = "connected";  // "connected" | "reconnecting"
let msgId = 1;

let notebooks = {};   // id -> notebook
let folders = {};     // id -> folder (for the active notebook)
let notes = {};       // id -> note (for the active notebook)
// Per-notebook caches — lets us render immediately on notebook switch even
// when the fresh scry fails (offline/reconnecting). Populated on successful
// load and on switcher-index builds.
let foldersByNb = {}; // notebookId -> { folderId -> folder }
let notesByNb = {};   // notebookId -> { noteId -> note }
let publishedIds = new Set();  // set of published note IDs

let activeNotebookId = null;   // numeric id
let activeNotebookFlag = null; // "~ship/name" for scry paths
let activeFolderId = null;
let activeNoteId = null;
let dirty = false;
let savedRevision = 0;

// ── Connect ────────────────────────────────────────────────────────────────
async function connect() {
  const url = document.getElementById("ship-url-input").value.trim().replace(/\/$/, "");
  const code = document.getElementById("auth-input").value.trim();
  const errEl = document.getElementById("connect-error");
  const panel = document.getElementById("connect-panel");
  errEl.textContent = "";

  function fail(msg) { errEl.textContent = msg; panel.style.display = ""; }

  if (!url) { fail("Enter a URL"); return; }
  BASE_URL = url;

  // Optionally authenticate with +code
  if (code) {
    try {
      const params = new URLSearchParams({ password: code });
      const r = await fetch(`${BASE_URL}/~/login`, {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
      });
      if (!r.ok && r.status !== 204) throw new Error(`Login failed: ${r.status}`);
    } catch(e) {
      fail(e.message); return;
    }
  }

  // Get ship name
  try {
    const r = await fetch(`${BASE_URL}/~/scry/notes/v0/notebooks.json`, { credentials: "include" });
    if (r.status === 403) { fail("Auth failed — check your +code"); return; }
    if (!r.ok && r.status !== 404) { fail(`Cannot reach ship: ${r.status}`); return; }
  } catch(e) { fail(`Cannot reach ship: ${e.message}`); return; }

  // Get own ship name
  try {
    const r = await fetch(`${BASE_URL}/~/name`, { credentials: "include" });
    if (r.ok) SHIP = (await r.text()).trim();
  } catch(e) {}

  document.getElementById("connect-panel").style.display = "none";
  setConnectionState("connected");

  openChannel();
  await loadNotebooks();
  await loadPublished();
  const applied = await applyRoute();
  // Only fall back to localStorage on desktop — on mobile each "screen" should
  // correspond to a URL, and opening a bare /notes/ URL means start fresh.
  if (!applied && !isMobile()) {
    await restoreSelection();
    replaceRoute();
  }
  // Re-enable slide transitions now that the initial view is settled.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => document.body.classList.remove("loading"));
  });
  maybeShowDisclaimer();
}

function saveSelection() {
  localStorage.setItem('notes-selection', JSON.stringify({
    notebookId: activeNotebookId,
    folderId: activeFolderId,
    noteId: activeNoteId,
  }));
}

async function restoreSelection() {
  try {
    const saved = JSON.parse(localStorage.getItem('notes-selection') || '{}');
    if (saved.notebookId && notebooks[saved.notebookId]) {
      await selectNotebook(saved.notebookId);
      if (saved.folderId && folders[saved.folderId]) {
        activeFolderId = saved.folderId;
        renderItems();
      }
      if (saved.noteId && notes[saved.noteId]) {
        await selectNote(saved.noteId);
      }
    }
  } catch {}
}

// ── Routing ──────────────────────────────────────────────────────────────
// URL scheme: /notes/nb/<host>/<flagName>[/f/<folderId>][/n/<noteId>]
let applyingRoute = false;

function buildRoute() {
  if (!activeNotebookId) return "/notes/";
  const nb = notebooks[activeNotebookId];
  if (!nb) return "/notes/";
  let path = `/notes/nb/${nb.host}/${encodeURIComponent(nb.flagName)}`;
  const rootId = rootFolderId();
  if (activeFolderId && activeFolderId !== rootId) path += `/f/${activeFolderId}`;
  if (activeNoteId) path += `/n/${activeNoteId}`;
  return path;
}

function pushRoute() {
  if (applyingRoute) return;
  const url = buildRoute();
  if (window.location.pathname === url) return;
  try { history.pushState({}, "", url); } catch(_) {}
}

function replaceRoute() {
  const url = buildRoute();
  if (window.location.pathname === url) return;
  try { history.replaceState({}, "", url); } catch(_) {}
}

async function applyRoute() {
  const path = window.location.pathname;
  const m = path.match(/^\/notes\/nb\/([^/]+)\/([^/]+)(?:\/f\/(\d+))?(?:\/n\/(\d+))?\/?$/);
  if (!m) return false;
  const host = decodeURIComponent(m[1]);
  const flagName = decodeURIComponent(m[2]);
  const fid = m[3] ? parseInt(m[3], 10) : null;
  const nid = m[4] ? parseInt(m[4], 10) : null;

  const flag = `${host}/${flagName}`;
  const nb = Object.values(notebooks).find(x => x.flag === flag);
  if (!nb) return false;

  applyingRoute = true;
  try {
    if (activeNotebookId !== nb.id) await selectNotebook(nb.id);
    // Folder: URL value or implicit root
    const targetFolder = fid && folders[fid] ? fid : rootFolderId();
    if (targetFolder && activeFolderId !== targetFolder) {
      await navigateToFolder(targetFolder);
    }
    // Note: URL specifies one or deselect
    if (nid && notes[nid]) {
      if (activeNoteId !== nid) await selectNote(nid);
    } else if (activeNoteId) {
      activeNoteId = null;
      clearEditor();
      renderItems();
    }
    // Drive the mobile slide-panel view from the URL
    if (isMobile()) mobileSetView(nid ? "editor" : "notes");
  } finally {
    applyingRoute = false;
  }
  return true;
}

function clearSelection() {
  activeNotebookId = null;
  activeNotebookFlag = null;
  activeFolderId = null;
  activeNoteId = null;
  clearEditor();
  renderNotebooks();
  renderItems();
  if (isMobile()) mobileSetView("notebooks");
}

window.addEventListener("popstate", async () => {
  const applied = await applyRoute();
  if (!applied) {
    applyingRoute = true;
    try { clearSelection(); } finally { applyingRoute = false; }
  }
});

// ── Eyre Channel ──────────────────────────────────────────────────────────
function openChannel() {
  channelId = `notes-ui-${Date.now()}`;
}

let activeSubscriptionId = null;

async function subscribeEvents() {
  if (!activeNotebookFlag) return;
  // Unsubscribe from previous notebook if any
  if (activeSubscriptionId !== null) {
    await poke([{
      id: msgId++, action: "unsubscribe",
      subscription: activeSubscriptionId
    }]);
    activeSubscriptionId = null;
  }
  // Subscribe to this notebook's stream
  const subId = msgId++;
  activeSubscriptionId = subId;
  await poke([{
    id: subId, action: "subscribe",
    ship: SHIP.replace("~",""),
    app: "notes", path: `/v0/notes/${activeNotebookFlag}/stream`
  }]);
  // Start SSE after the channel is created by the PUT
  startSSE();
}

function startSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`${BASE_URL}/~/channel/${channelId}`, { withCredentials: true });
  eventSource.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleEvent(msg);
    } catch {}
  };
  eventSource.onerror = () => { setConnectionState("reconnecting"); };
  eventSource.onopen = () => { setConnectionState("connected"); };
}

async function poke(actions) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try {
    await fetch(`${BASE_URL}/~/channel/${channelId}`, {
      method: "PUT",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(actions),
      signal: ctrl.signal
    });
  } finally {
    clearTimeout(timer);
  }
}

async function pokeAction(action) {
  const id = msgId++;
  // Include _flag for unambiguous notebook routing across ships
  if (activeNotebookFlag) {
    action._flag = activeNotebookFlag;
  }
  await poke([{
    id, action: "poke",
    ship: SHIP.replace("~",""),
    app: "notes",
    mark: "notes-action",
    json: action
  }]);
}

async function scry(path) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 6000);
  try {
    const r = await fetch(`${BASE_URL}/~/scry/notes${path}.json`, {
      credentials: "include", signal: ctrl.signal
    });
    if (!r.ok) return null;
    return await r.json();
  } catch (_) {
    // Network error, abort, or bad JSON — treat as "no fresh data" so the
    // caller can fall back to cache instead of propagating the rejection.
    return null;
  } finally {
    clearTimeout(timer);
  }
}

// ── Event Handling ────────────────────────────────────────────────────────
function handleEvent(msg) {
  if (!msg.json) return;
  const data = msg.json;

  // Handle response envelope from /stream subscription
  if (data.response === "snapshot") {
    // Full reload on snapshot
    loadNotebooks();
    return;
  }
  if (data.response === "update") {
    const evt = data.update;
    const type = evt.type;
    // Reload relevant data on events
    if (type === "notebook-created" || type === "notebook-renamed" || type === "notebook-visibility-changed") loadNotebooks();
    else if (type === "notebook-deleted") handleNotebookDeleted(evt.notebookId);
    else if (type?.startsWith("folder-")) loadFolders(activeNotebookId);
    else if (type?.startsWith("note-")) {
      loadNotes(activeNotebookId);
      if (type === "note-updated" && evt.noteId === activeNoteId && !isOwnSaveEcho(evt)) {
        if (dirty) showConflictBanner("Remote changes detected while you were editing.");
        else loadNote(activeNoteId);
      }
    }
    return;
  }

  // Fallback: try handling as a raw event (backwards compat)
  const type = data.type;
  if (type === "notebook-created" || type === "notebook-renamed" || type === "notebook-visibility-changed") loadNotebooks();
  else if (type === "notebook-deleted") handleNotebookDeleted(data.notebookId);
  else if (type?.startsWith("folder-")) loadFolders(activeNotebookId);
  else if (type?.startsWith("note-")) {
    loadNotes(activeNotebookId);
    if (type === "note-updated" && data.noteId === activeNoteId && !isOwnSaveEcho(data)) {
      if (dirty) showConflictBanner("Remote changes detected while you were editing.");
      else loadNote(activeNoteId);
    }
  }
}

function handleNotebookDeleted(nid) {
  // If the deleted notebook is currently active, clear the view
  if (activeNotebookId === nid) {
    activeNotebookId = null;
    activeNotebookFlag = null;
    activeFolderId = null;
    activeNoteId = null;
    clearEditor();
    pushRoute();
  }
  loadNotebooks();
}

// ── Load Data ─────────────────────────────────────────────────────────────
// Compound key "~host/flagName|noteId" so publish state is scoped per-notebook
function pubKey(flag, noteId) { return `${flag}|${noteId}`; }
function pubUrl(flag, noteId) { return `${BASE_URL}/notes/pub/${flag}/${noteId}`; }

async function loadPublished() {
  const data = await scry("/v0/published");
  if (!data) return;  // preserve cache if scry failed
  publishedIds = new Set();
  (data || []).forEach(item => {
    const flag = `${item.host}/${item.flagName}`;
    publishedIds.add(pubKey(flag, item.noteId));
  });
}

async function loadNotebooks() {
  const data = await scry("/v0/notebooks");
  if (!data) return;
  notebooks = {};
  (data || []).forEach(entry => {
    const nb = entry.notebook;
    nb.host = entry.host;
    nb.flagName = entry.flagName;
    nb.flag = `${entry.host}/${entry.flagName}`;
    nb.visibility = entry.visibility || 'private';
    notebooks[nb.id] = nb;
  });
  renderNotebooks();
  updateHeader();
}

async function loadFolders(notebookId) {
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/folders/${activeNotebookFlag}`);
  // Only replace the cache when we got fresh data — otherwise preserve what
  // we already have so offline/reconnecting users can still walk around.
  if (data) {
    folders = {};
    (data || []).forEach(f => folders[f.id] = f);
    foldersByNb[notebookId] = { ...folders };
  }
  if (!activeFolderId || !folders[activeFolderId]) {
    const rootFolder = Object.values(folders).find(f => f.name === "/");
    activeFolderId = rootFolder ? rootFolder.id : null;
  }
  renderItems();
}

async function loadNotes(notebookId) {
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/notes/${activeNotebookFlag}`);
  if (data) {
    notes = {};
    (data || []).forEach(n => notes[n.id] = n);
    notesByNb[notebookId] = { ...notes };
  }
  renderItems();
  renderBacklinks();
}

function rootFolderId() {
  const root = Object.values(folders).find(f => f.name === "/");
  return root ? root.id : null;
}

async function loadNote(noteId) {
  // reload all notes to get fresh data, then update editor if needed
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/notes/${activeNotebookFlag}`);
  if (!data) return;
  (data || []).forEach(n => notes[n.id] = n);
  const n = notes[noteId];
  if (!n) return;
  if (activeNoteId === n.id) {
    document.getElementById("note-title-input").value = n.title;
    document.getElementById("editor").value = n.bodyMd;
    autosizeEditor();
    savedRevision = n.revision;
    clearDirty();
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function renderNotebooks() {
  const el = document.getElementById("notebooks-list");
  el.innerHTML = "";
  const list = Object.values(notebooks);
  if (!list.length) {
    el.innerHTML = '<div class="empty-state" style="padding:20px 12px;font-size:12px">No notebooks yet.<br>Click <strong>Add notebook</strong> below.</div>';
    return;
  }
  list.sort((a,b) => a.title.localeCompare(b.title)).forEach(nb => {
    const div = document.createElement("div");
    div.className = "nb-item" + (nb.id === activeNotebookId ? " active" : "");
    const lockHtml = nb.visibility === "private" ? `<svg class="icon nb-lock"><use href="#i-lock"/></svg>` : "";
    div.innerHTML = `<span class="nb-icon">${icon('notebook')}</span><span class="nb-name">${esc(nb.title)}</span>${lockHtml}<span class="nb-flag" title="Click to copy flag">${esc(nb.flag)}</span>`;
    div.onclick = () => selectNotebook(nb.id);
    div.querySelector(".nb-flag").onclick = (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(nb.flag);
      const el = e.target;
      const orig = el.textContent;
      el.textContent = "copied!";
      setTimeout(() => el.textContent = orig, 1000);
    };
    el.appendChild(div);
  });
}

function updateHeader() {
  const labelEl = document.getElementById("folder-label");
  const upBtn = document.getElementById("folder-up-btn");
  const newFolderBtn = document.getElementById("new-folder-btn");
  const newNoteBtn = document.getElementById("new-note-btn");
  const settingsWrap = document.getElementById("notebook-settings-wrap");
  if (!activeNotebookId) {
    labelEl.textContent = "Notes";
    upBtn.style.display = "none";
    newFolderBtn.style.display = "none";
    newNoteBtn.style.display = "none";
    settingsWrap.style.display = "none";
    return;
  }
  newFolderBtn.style.display = "";
  newNoteBtn.style.display = "";
  const rootId = rootFolderId();
  const isAtRoot = !activeFolderId || activeFolderId === rootId;
  if (isAtRoot) {
    const nb = notebooks[activeNotebookId];
    labelEl.textContent = nb?.title || "Notes";
    upBtn.style.display = "none";
    settingsWrap.style.display = "";
    // Show rename/delete + visibility toggle for local notebooks, leave for remote.
    // Normalize by stripping tildes — `/~/name` and scot %p aren't guaranteed to match formats.
    const isLocal = nb && SHIP && nb.host.replace(/^~/, "") === SHIP.replace(/^~/, "");
    document.getElementById("nb-menu-rename").style.display = isLocal ? "" : "none";
    document.getElementById("nb-menu-delete").style.display = isLocal ? "" : "none";
    document.getElementById("nb-menu-leave").style.display = isLocal ? "none" : "";
    const visBtn = document.getElementById("nb-menu-visibility");
    if (isLocal) {
      visBtn.style.display = "";
      visBtn.textContent = nb.visibility === "public" ? "Make private" : "Make public";
    } else {
      visBtn.style.display = "none";
    }
  } else {
    labelEl.textContent = folders[activeFolderId]?.name || "Folder";
    upBtn.style.display = "";
    settingsWrap.style.display = "none";
  }
}

function renderItems() {
  updateHeader();
  const el = document.getElementById("notes-list");
  el.innerHTML = "";
  if (!activeNotebookId || !activeFolderId) return;

  const subfolders = Object.values(folders)
    .filter(f => f.parentFolderId === activeFolderId && f.name !== "/")
    .sort((a,b) => a.name.localeCompare(b.name));

  const notesHere = Object.values(notes)
    .filter(n => n.folderId === activeFolderId)
    .sort((a,b) => b.updatedAt - a.updatedAt);

  if (!subfolders.length && !notesHere.length) {
    el.innerHTML = "<div class=\"empty-state\">Empty folder</div>";
    return;
  }

  subfolders.forEach(f => {
    const div = document.createElement("div");
    div.className = "item-row is-folder";
    div.innerHTML = `
      <span class="item-icon" data-folder-id="${f.id}">
        <svg class="icon folder-glyph"><use href="#i-folder"/></svg>
        <svg class="icon ellipsis-glyph"><use href="#i-ellipsis"/></svg>
      </span>
      <div class="item-body">
        <div class="item-title">${esc(f.name)}</div>
      </div>
      <span class="item-chevron">${icon('chevron-right')}</span>
    `;
    div.querySelector(".item-icon").addEventListener("click", (e) => {
      e.stopPropagation();
      openFolderActionMenu(f, e.currentTarget);
    });
    div.onclick = () => navigateToFolder(f.id);
    el.appendChild(div);
  });

  notesHere.forEach(n => {
    const div = document.createElement("div");
    div.className = "item-row is-note" + (n.id === activeNoteId ? " active" : "");
    const d = new Date(n.updatedAt * 1000);
    const dateStr = d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
    const preview = notePreview(n.bodyMd);
    div.innerHTML = `
      <span class="item-icon">${icon('doc')}</span>
      <div class="item-body">
        <div class="item-title-row">
          <div class="item-title">${esc(n.title)}</div>
          <div class="item-date">${dateStr}</div>
        </div>
        <div class="item-preview">${preview ? esc(preview) : "<span style='opacity:0.5'>No content</span>"}</div>
      </div>
    `;
    div.onclick = () => selectNote(n.id);
    el.appendChild(div);
  });
}

// ── Import ────────────────────────────────────────────────────────────────
// ── Export ───────────────────────────────────────────────────────────────
function sanitizeFilename(name) {
  return String(name).replace(/[\/\\:*?"<>|]/g, "_").replace(/^\.+$/g, "_").slice(0, 120) || "Untitled";
}

// Minimal "store" (uncompressed) ZIP encoder — no external deps.
function crc32(data) {
  if (!crc32.table) {
    const t = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
      t[n] = c;
    }
    crc32.table = t;
  }
  let c = 0xffffffff;
  for (let i = 0; i < data.length; i++) c = crc32.table[(c ^ data[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}

function buildZip(entries) {
  const encoder = new TextEncoder();
  const parts = [];
  const central = [];
  let offset = 0;
  for (const e of entries) {
    const name = encoder.encode(e.name);
    const crc = crc32(e.data);
    const size = e.data.length;
    const lh = new Uint8Array(30 + name.length);
    const lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0x0800, true);
    lv.setUint16(8, 0, true);
    lv.setUint16(10, 0, true);
    lv.setUint16(12, 0x21, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true);
    lv.setUint32(22, size, true);
    lv.setUint16(26, name.length, true);
    lv.setUint16(28, 0, true);
    lh.set(name, 30);
    parts.push(lh, e.data);

    const ch = new Uint8Array(46 + name.length);
    const cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0x0800, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0x21, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, name.length, true);
    cv.setUint32(42, offset, true);
    ch.set(name, 46);
    central.push(ch);

    offset += lh.length + size;
  }
  const centralOffset = offset;
  const centralSize = central.reduce((s, c) => s + c.length, 0);
  parts.push(...central);

  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, entries.length, true);
  ev.setUint16(10, entries.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  parts.push(eocd);

  const total = parts.reduce((s, p) => s + p.length, 0);
  const out = new Uint8Array(total);
  let o = 0;
  for (const p of parts) { out.set(p, o); o += p.length; }
  return out;
}

async function exportNotebook() {
  closeNotebookSettings();
  if (!activeNotebookId) return;
  const nb = notebooks[activeNotebookId];
  if (!nb) return;
  await loadFolders(activeNotebookId);
  await loadNotes(activeNotebookId);

  const rootId = rootFolderId();
  const pathOf = (fid) => {
    if (!fid || fid === rootId) return "";
    const f = folders[fid];
    if (!f) return "";
    const parent = pathOf(f.parentFolderId);
    return (parent ? parent + "/" : "") + sanitizeFilename(f.name);
  };

  const encoder = new TextEncoder();
  const used = new Set();
  const entries = Object.values(notes).map(note => {
    const folderPath = pathOf(note.folderId);
    const base = sanitizeFilename(note.title || "Untitled");
    let name = (folderPath ? folderPath + "/" : "") + base + ".md";
    let i = 2;
    while (used.has(name)) {
      name = (folderPath ? folderPath + "/" : "") + base + "-" + i + ".md";
      i++;
    }
    used.add(name);
    return { name, data: encoder.encode(note.bodyMd || "") };
  });

  if (!entries.length) { alert("This notebook has no notes to export."); return; }

  const zip = buildZip(entries);
  const blob = new Blob([zip], { type: "application/zip" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = sanitizeFilename(nb.title || "notebook") + ".zip";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function triggerImport(isFolder) {
  if (!activeNotebookId) { alert("Select a notebook first"); return; }
  const input = document.createElement("input");
  input.type = "file";
  if (isFolder) {
    input.webkitdirectory = true;
  } else {
    input.multiple = true;
    input.accept = ".md,.txt,.markdown,.text";
  }
  input.onchange = async (e) => {
    const allFiles = Array.from(e.target.files);
    const mdFiles = allFiles.filter(f => /\.(md|txt|markdown|text)$/i.test(f.name));
    if (!mdFiles.length) { alert("No .md or .txt files found"); return; }
    document.getElementById("save-status").textContent = "Importing " + mdFiles.length + " files…";

    let folderId = activeFolderId;
    if (!folderId) {
      const rootFolder = Object.values(folders).find(f => f.name === "/");
      if (rootFolder) folderId = rootFolder.id;
      else { alert("No folders found"); return; }
    }

    if (isFolder) {
      // Build tree from webkitRelativePath
      const tree = [];
      for (const file of mdFiles) {
        const parts = file.webkitRelativePath.split("/");
        // parts[0] is root folder name, rest are subfolders + filename
        let node = tree;
        // skip parts[0] (selected folder name) and last (filename)
        for (let i = 1; i < parts.length - 1; i++) {
          let existing = node.find(n => n.children && n.name === parts[i]);
          if (!existing) {
            existing = { name: parts[i], children: [] };
            node.push(existing);
          }
          node = existing.children;
        }
        const text = await file.text();
        const title = file.name.replace(/\.(md|txt|markdown|text)$/i, "");
        node.push({ title, bodyMd: text });
      }
      await pokeAction({
        "batch-import-tree": {
          notebookId: activeNotebookId,
          parentFolderId: folderId,
          tree: tree
        }
      });
    } else {
      const noteItems = [];
      for (const file of mdFiles) {
        const text = await file.text();
        const title = file.name.replace(/\.(md|txt|markdown|text)$/i, "");
        noteItems.push({ title, bodyMd: text });
      }
      await pokeAction({
        "batch-import": {
          notebookId: activeNotebookId,
          folderId: folderId,
          notes: noteItems
        }
      });
    }

    setTimeout(async () => {
      await loadFolders(activeNotebookId);
      await loadNotes(activeNotebookId);
      document.getElementById("save-status").textContent = "Imported " + mdFiles.length + " notes";
      setTimeout(() => { document.getElementById("save-status").textContent = ""; }, 3000);
    }, 500);
  };
  document.body.appendChild(input);
  input.click();
  input.remove();
}

// ── Markdown Preview ──────────────────────────────────────────────────────
let previewMode = false;

function renderMarkdown(src) {
  // escape HTML
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const lines = src.split("\n");
  let html = "";
  let inCode = false, codeLang = "", codeLines = [];
  let inList = false, listType = "";
  let inBlockquote = false;

  function flushList() {
    if (inList) { html += listType === "ul" ? "</ul>\n" : "</ol>\n"; inList = false; }
  }
  function flushBlockquote() {
    if (inBlockquote) { html += "</blockquote>\n"; inBlockquote = false; }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // fenced code blocks
    if (/^```/.test(line)) {
      if (!inCode) {
        flushList(); flushBlockquote();
        codeLang = line.slice(3).trim();
        codeLines = [];
        inCode = true;
        continue;
      } else {
        html += "<pre><code" + (codeLang ? " class=\"language-" + esc(codeLang) + "\"" : "") + ">" + esc(codeLines.join("\n")) + "</code></pre>\n";
        inCode = false;
        continue;
      }
    }
    if (inCode) { codeLines.push(line); continue; }

    // blank line
    if (!line.trim()) { flushList(); flushBlockquote(); html += "\n"; continue; }

    // headings
    const hm = line.match(/^(#{1,6})\s+(.*)/);
    if (hm) { flushList(); flushBlockquote(); const lvl = hm[1].length; html += "<h" + lvl + ">" + inline(hm[2]) + "</h" + lvl + ">\n"; continue; }

    // hr
    if (/^([-*_]\s*){3,}$/.test(line.trim())) { flushList(); flushBlockquote(); html += "<hr>\n"; continue; }

    // blockquote
    if (/^>\s?/.test(line)) {
      flushList();
      const content = line.replace(/^>\s?/, "");
      if (!inBlockquote) { html += "<blockquote>\n"; inBlockquote = true; }
      html += "<p>" + inline(content) + "</p>\n";
      continue;
    } else { flushBlockquote(); }

    // unordered list
    const ulm = line.match(/^(\s*)[-*+]\s+(.*)/);
    if (ulm) {
      if (!inList || listType !== "ul") { flushList(); html += "<ul>\n"; inList = true; listType = "ul"; }
      // checkbox
      const cbm = ulm[2].match(/^\[([ xX])\]\s*(.*)/);
      if (cbm) {
        const checked = cbm[1] !== " " ? " checked disabled" : " disabled";
        html += "<li><input type=\"checkbox\"" + checked + "> " + inline(cbm[2]) + "</li>\n";
      } else {
        html += "<li>" + inline(ulm[2]) + "</li>\n";
      }
      continue;
    }

    // ordered list
    const olm = line.match(/^(\s*)\d+[.)]\s+(.*)/);
    if (olm) {
      if (!inList || listType !== "ol") { flushList(); html += "<ol>\n"; inList = true; listType = "ol"; }
      html += "<li>" + inline(olm[2]) + "</li>\n";
      continue;
    }

    flushList();
    // table
    if (line.includes("|") && i + 1 < lines.length && /^[\s|:-]+$/.test(lines[i + 1])) {
      const parseRow = r => r.split("|").map(c => c.trim()).filter(c => c !== "");
      const headers = parseRow(line);
      html += "<table><thead><tr>" + headers.map(h => "<th>" + inline(h) + "</th>").join("") + "</tr></thead><tbody>\n";
      i++; // skip separator
      while (i + 1 < lines.length && lines[i + 1].includes("|")) {
        i++;
        const cells = parseRow(lines[i]);
        html += "<tr>" + cells.map(c => "<td>" + inline(c) + "</td>").join("") + "</tr>\n";
      }
      html += "</tbody></table>\n";
      continue;
    }

    // paragraph
    html += "<p>" + inline(line) + "</p>\n";
  }
  if (inCode) html += "<pre><code>" + esc(codeLines.join("\n")) + "</code></pre>\n";
  flushList(); flushBlockquote();
  return html;
}

function inline(s) {
  const esc = t => t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const attr = t => esc(t).replace(/"/g, "&quot;");
  // inline code first (to protect contents)
  let result = "";
  let rest = s;
  while (rest) {
    const cm = rest.match(/`([^`]+)`/);
    if (!cm) { result += rest; break; }
    result += rest.slice(0, cm.index);
    result += "<code>" + esc(cm[1]) + "</code>";
    rest = rest.slice(cm.index + cm[0].length);
  }
  s = result;
  // wiki-links [[Title]] — before standard links so double brackets don't interfere
  s = s.replace(/\[\[([^\[\]]+?)\]\]/g, (m, raw) => {
    const target = raw.trim();
    const note = resolveWikiLink(target);
    if (note) {
      return `<a class="wiki-link" data-note-id="${note.id}" href="javascript:void(0)">${esc(target)}</a>`;
    }
    return `<a class="wiki-link unresolved" data-wiki-target="${attr(target)}" href="javascript:void(0)">${esc(target)}</a>`;
  });
  // images before links
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, "<img src=\"$2\" alt=\"$1\">");
  // links
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, "<a href=\"$2\" target=\"_blank\">$1</a>");
  // bold+italic
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  s = s.replace(/___(.+?)___/g, "<strong><em>$1</em></strong>");
  // bold
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/__(.+?)__/g, "<strong>$1</strong>");
  // italic
  s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
  s = s.replace(/_(.+?)_/g, "<em>$1</em>");
  // strikethrough
  s = s.replace(/~~(.+?)~~/g, "<del>$1</del>");
  return s;
}

// ── Selection ─────────────────────────────────────────────────────────────
async function selectNotebook(id) {
  if (!await confirmDirty()) return;
  const changing = activeNotebookId !== id;
  activeNotebookId = id;
  const nb = notebooks[id];
  activeNotebookFlag = nb ? nb.flag : null;
  activeFolderId = null;  // loadFolders will set this to root folder id
  activeNoteId = null;
  if (changing) {
    // Restore from per-notebook caches (populated by prior visits or by the
    // switcher's index build) so the UI paints target-notebook data
    // immediately — even if the fresh scry below fails offline.
    folders = foldersByNb[id] ? { ...foldersByNb[id] } : {};
    notes = notesByNb[id] ? { ...notesByNb[id] } : {};
  }
  clearEditor();
  renderNotebooks();
  await loadFolders(id);
  await loadNotes(id);
  subscribeEvents();
  saveSelection();
  pushRoute();
  if (isMobile()) mobileSetView("notes");
}

async function selectNote(id) {
  if (!await confirmDirty()) return;
  dismissConflictBanner();
  activeNoteId = id;
  renderItems();
  const n = notes[id];
  document.getElementById("note-title-input").value = n.title;
  document.getElementById("editor").value = n.bodyMd;
  autosizeEditor();
  if (previewMode) document.getElementById("preview").innerHTML = renderMarkdown(n.bodyMd);
  savedRevision = n.revision;
  document.getElementById("note-rev").textContent = `rev ${n.revision}`;
  document.title = `${n.title || "Untitled"} — Notes`;
  clearDirty();
  document.getElementById("overflow-note-section").style.display = "";
  updateBreadcrumb();
  renderBacklinks();
  saveSelection();
  pushRoute();
  // Update publish/unpublish button state
  const isPublished = publishedIds.has(pubKey(activeNotebookFlag, id));
  document.getElementById("publish-btn").style.display = isPublished ? "none" : "";
  document.getElementById("unpublish-btn").style.display = isPublished ? "" : "none";
  document.getElementById("view-published-btn").style.display = isPublished ? "" : "none";
  if (isMobile()) mobileSetView("editor");
}

// ── Quick switcher ────────────────────────────────────────────────────────
let switcherItems = [];
let switcherFiltered = [];
let switcherSelIdx = 0;
let switcherBuilding = false;

function switcherOpen() { return document.getElementById("switcher-backdrop").classList.contains("open"); }

async function openSwitcher(initialQuery) {
  if (switcherOpen()) return;
  document.getElementById("switcher-backdrop").classList.add("open");
  const input = document.getElementById("switcher-input");
  const q = typeof initialQuery === "string" ? initialQuery : "";
  input.value = q;
  renderSwitcherResults(q);
  input.focus();
  input.setSelectionRange(q.length, q.length);
  // Build/refresh the index in the background; re-render when it lands.
  if (!switcherBuilding) {
    switcherBuilding = true;
    await buildSwitcherIndex();
    switcherBuilding = false;
    if (switcherOpen()) renderSwitcherResults(input.value);
  }
}

function closeSwitcher() {
  document.getElementById("switcher-backdrop").classList.remove("open");
  switcherSelIdx = 0;
}

function onSwitcherBackdropClick(e) {
  if (e.target.id === "switcher-backdrop") closeSwitcher();
}

async function buildSwitcherIndex() {
  const items = [];
  const nbs = Object.values(notebooks);
  // Always include notebooks immediately — fast path.
  for (const nb of nbs) {
    items.push({
      kind: "notebook",
      label: nb.title || "Untitled notebook",
      subtitle: nb.flag,
      navigate: () => selectNotebook(nb.id)
    });
  }
  // Fetch folders + notes for every notebook in parallel.
  await Promise.all(nbs.map(async (nb) => {
    const flag = nb.flag;
    let fdata = [], ndata = [];
    try { [fdata, ndata] = await Promise.all([
      scry(`/v0/folders/${flag}`),
      scry(`/v0/notes/${flag}`)
    ]); } catch (_) { return; }
    // Stash into the per-notebook caches so cross-notebook nav works offline.
    if (fdata) {
      foldersByNb[nb.id] = {};
      (fdata || []).forEach(f => foldersByNb[nb.id][f.id] = f);
    }
    if (ndata) {
      notesByNb[nb.id] = {};
      (ndata || []).forEach(n => notesByNb[nb.id][n.id] = n);
    }
    const fByNb = {};
    (fdata || []).forEach(f => fByNb[f.id] = f);
    const nbName = nb.title || "Untitled notebook";
    (fdata || []).forEach(f => {
      if (f.name === "/") return;
      items.push({
        kind: "folder",
        label: f.name,
        subtitle: nbName,
        navigate: async () => { await selectNotebook(nb.id); navigateToFolder(f.id); }
      });
    });
    (ndata || []).forEach(n => {
      const f = fByNb[n.folderId];
      const folderPart = f && f.name !== "/" ? ` · ${f.name}` : "";
      items.push({
        kind: "note",
        label: n.title || "Untitled",
        subtitle: nbName + folderPart,
        navigate: async () => { await selectNotebook(nb.id); await selectNote(n.id); },
        // Rich metadata reused by full-text search
        noteId: n.id,
        notebookId: nb.id,
        notebookTitle: nbName,
        folderLabel: folderPart,
        bodyMd: n.bodyMd || "",
        updatedAt: n.updatedAt || 0
      });
    });
  }));
  switcherItems = items;
}

function scoreSwitcherMatch(query, target) {
  if (!query) return 1;  // no query: all items tie, original order wins
  const q = query.toLowerCase();
  const t = target.toLowerCase();
  const idx = t.indexOf(q);
  if (idx >= 0) return 1000 - idx - (t.length - q.length) * 0.1;
  // Subsequence match with streak bonus
  let qi = 0, score = 0, streak = 0, lastMatch = -2;
  for (let ti = 0; ti < t.length && qi < q.length; ti++) {
    if (t[ti] === q[qi]) {
      qi++;
      if (ti === lastMatch + 1) streak++; else streak = 0;
      score += 1 + streak * 2;
      // small bonus for word-boundary matches
      if (ti === 0 || /[\s\/\-_]/.test(t[ti-1])) score += 2;
      lastMatch = ti;
    }
  }
  return qi === q.length ? score : -1;
}

function renderSwitcherResults(query) {
  const root = document.getElementById("switcher-results");
  const scored = [];
  for (const item of switcherItems) {
    const s = scoreSwitcherMatch(query, item.label);
    if (s > 0) scored.push({ item, score: s });
  }
  scored.sort((a, b) => b.score - a.score);
  switcherFiltered = scored.slice(0, 40).map(x => x.item);
  switcherSelIdx = 0;

  if (switcherFiltered.length === 0) {
    root.innerHTML = `<div class="switcher-empty">${switcherItems.length === 0 && switcherBuilding ? "Loading…" : "No matches"}</div>`;
    return;
  }
  const iconFor = (k) => k === "notebook" ? "notebook" : (k === "folder" ? "folder" : "doc");
  root.innerHTML = switcherFiltered.map((it, i) =>
    `<div class="switcher-result${i === 0 ? ' selected' : ''}" data-idx="${i}">
       <span class="result-icon">${icon(iconFor(it.kind))}</span>
       <span class="switcher-result-text">
         <span class="switcher-result-label">${esc(it.label)}</span>
         ${it.subtitle ? `<span class="switcher-result-subtitle">${esc(it.subtitle)}</span>` : ""}
       </span>
     </div>`
  ).join("");
  root.querySelectorAll(".switcher-result").forEach(el => {
    el.addEventListener("click", () => {
      switcherSelIdx = parseInt(el.dataset.idx, 10);
      selectSwitcherResult();
    });
    el.addEventListener("mouseenter", () => setSwitcherSelection(parseInt(el.dataset.idx, 10)));
  });
}

function setSwitcherSelection(idx) {
  const els = document.querySelectorAll("#switcher-results .switcher-result");

  switcherSelIdx = idx;

  else if (e.key === "ArrowUp") { e.preventDefault(); setSwitcherSelection(Math.max(switcherSelIdx - 1, 0)); }

// ── Full-text search ──────────────────────────────────────────────────────
let searchResults = [];
let searchSelIdx = 0;
let searchBuilding = false;

function isSearchOpen() {
  return document.getElementById("search-backdrop").classList.contains("open");
}

async function openSearch(initialQuery) {
  if (isSearchOpen()) return;
  if (switcherOpen()) closeSwitcher();
  document.getElementById("search-backdrop").classList.add("open");
  const input = document.getElementById("search-input");
  const q = typeof initialQuery === "string" ? initialQuery : "";
  input.value = q;
  renderSearchResults(q);
  input.focus();
  input.setSelectionRange(q.length, q.length);
  // Reuse the switcher index (prefetches all notebooks' notes + bodies).
  if (switcherItems.length === 0 && !switcherBuilding && !searchBuilding) {
    searchBuilding = true;
    await buildSwitcherIndex();
    searchBuilding = false;
    if (isSearchOpen()) renderSearchResults(input.value);
  }
}

function closeSearch() {
  document.getElementById("search-backdrop").classList.remove("open");
  searchSelIdx = 0;
}

function onSearchBackdropClick(e) {
  if (e.target.id === "search-backdrop") closeSearch();
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

function scoreSearchHit(query, note) {
  const q = query.toLowerCase();
  const title = (note.label || "").toLowerCase();
  const body = (note.bodyMd || "").toLowerCase();
  if (title === q) return { score: 10000, where: "title", idx: 0 };
  const tIdx = title.indexOf(q);
  if (tIdx >= 0) return { score: 5000 - tIdx, where: "title", idx: tIdx };
  const bIdx = body.indexOf(q);
  if (bIdx >= 0) return { score: Math.max(1, 2000 - bIdx * 0.05), where: "body", idx: bIdx };
  return null;
}

function makeSearchSnippet(body, hitIdx, query) {
  if (hitIdx < 0 || !body) return "";
  const before = 40, after = 100;
  const start = Math.max(0, hitIdx - before);
  const end = Math.min(body.length, hitIdx + query.length + after);
  let text = body.slice(start, end);
  if (start > 0) text = "…" + text;
  if (end < body.length) text += "…";
  const escText = esc(text);
  const re = new RegExp(escapeRegex(esc(query)), "gi");
  return escText.replace(re, m => `<mark>${m}</mark>`);
}

function renderSearchResults(query) {
  const root = document.getElementById("search-results");
  const q = (query || "").trim();
  if (!q) {
    root.innerHTML = `<div class="switcher-empty">${searchBuilding || switcherBuilding ? "Indexing notebooks…" : "Type to search across all notebooks"}</div>`;
    return;
  }
  const noteItems = switcherItems.filter(i => i.kind === "note");
  const scored = [];
  for (const n of noteItems) {
    const hit = scoreSearchHit(q, n);
    if (hit) scored.push({ item: n, hit });
  }
  scored.sort((a, b) => b.hit.score - a.hit.score);
  searchResults = scored.slice(0, 40);
  searchSelIdx = 0;
  if (searchResults.length === 0) {
    root.innerHTML = `<div class="switcher-empty">No matches</div>`;
    return;
  }
  root.innerHTML = searchResults.map((r, i) => {
    const n = r.item;
    const snippet = r.hit.where === "body" ? makeSearchSnippet(n.bodyMd, r.hit.idx, q) : "";
    const meta = `${esc(n.notebookTitle)}${n.folderLabel ? " " + esc(n.folderLabel) : ""}`;
    return `<div class="search-result${i === 0 ? " selected" : ""}" data-idx="${i}">
      <div class="search-result-title">${esc(n.label)}</div>
      ${snippet ? `<div class="search-result-snippet">${snippet}</div>` : ""}
      <div class="search-result-meta">${meta}</div>
    </div>`;
  }).join("");
  root.querySelectorAll(".search-result").forEach(el => {
    el.addEventListener("click", () => { searchSelIdx = parseInt(el.dataset.idx, 10); acceptSearchResult(); });
    el.addEventListener("mouseenter", () => setSearchSelection(parseInt(el.dataset.idx, 10)));
  });
}

function setSearchSelection(idx) {
  const els = document.querySelectorAll("#search-results .search-result");
  if (idx < 0 || idx >= els.length) return;
  searchSelIdx = idx;
  els.forEach((el, i) => el.classList.toggle("selected", i === idx));
  if (els[idx]) els[idx].scrollIntoView({ block: "nearest" });
}

async function acceptSearchResult() {
  const r = searchResults[searchSelIdx];
  if (!r) return;
  closeSearch();
  await r.item.navigate();
  focusEditorAtTop();
}

function focusEditorAtTop() {
  const ed = document.getElementById("editor");
  if (!ed) return;
  ed.focus();
  ed.setSelectionRange(0, 0);
  const scroll = document.querySelector(".editor-scroll");
  if (scroll) scroll.scrollTop = 0;
}

document.getElementById("search-input").addEventListener("input", (e) => {
  renderSearchResults(e.target.value);
});
document.getElementById("search-input").addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown") { e.preventDefault(); setSearchSelection(Math.min(searchSelIdx + 1, searchResults.length - 1)); }
  else if (e.key === "ArrowUp") { e.preventDefault(); setSearchSelection(Math.max(searchSelIdx - 1, 0)); }
  else if (e.key === "Enter") { e.preventDefault(); acceptSearchResult(); }
  else if (e.key === "Escape") { e.preventDefault(); closeSearch(); }
  else if (e.key === "Tab") { e.preventDefault(); const q = e.currentTarget.value; closeSearch(); openSwitcher(q); }
});
