<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --border-item: #1a1a1a;
    --text: #e8e8e8;
    --text-muted: #666;
    --accent: #7c6af7;
    --accent-hover: #9080ff;
    --danger: #e05c5c;
    --success: #4caf82;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: fixed;
    inset: 0;
  }

  /* ── sidebar footer (brand only) ── */
  .sidebar-brand {
    margin-top: 12px;
    padding: 4px 14px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  /* brand-icon now uses the default .icon opacity */
  .sidebar-brand .brand-name { font-size: 13px; font-weight: 600; }

  /* ── connection state label ── */
  #conn-label.reconnecting { color: #d4a72c; }
  #conn-label.disconnected { color: var(--danger); }

  /* ── layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── column resizers ── */
  .resizer {
    flex-shrink: 0;
    width: 3px;
    margin-left: -1px;       /* center the 3px hit area over the 1px border */
    cursor: col-resize;
    background: transparent;
    transition: background 0.15s;
    position: relative;
    z-index: 5;
    user-select: none;
    touch-action: none;
  }
  .resizer:hover,
  .resizer.dragging { background: rgba(124,106,247,0.4); }
  body.resizing { cursor: col-resize; user-select: none; }

  /* ── sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }
  .sidebar-section {
    height: 41px;
    padding: 0 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-section-actions { display: flex; align-items: center; gap: 2px; }

  /* Collapsed sidebar — hide sidebar and its resizer, reveal expand button */
  #sidebar-expand-btn { display: none; }
  body.sidebar-collapsed .sidebar { display: none; }
  body.sidebar-collapsed .resizer[data-target="sidebar"] { display: none; }
  body.sidebar-collapsed #sidebar-expand-btn { display: inline-flex; }
  .sidebar-list { flex: 1; overflow-y: auto; padding-bottom: 8px; min-height: 0; }
  .nb-item {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px 6px;
    padding: 6px 6px;
    cursor: pointer;
    border-radius: 4px;
    margin: 1px 4px;
    font-size: 13px;
    transition: background 0.1s;
    user-select: none;
  }
  .nb-item:hover { background: var(--surface2); }
  .nb-item.active { background: var(--accent); color: #fff; }
  .nb-item .nb-icon { flex-shrink: 0; display: flex; align-items: center; }
  .nb-item .nb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nb-item .nb-flag {
    width: 100%;
    font-size: 10px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-left: 22px;
  }
  .nb-item .nb-flag:hover { text-decoration: underline; }
  .nb-item.active .nb-flag { color: rgba(255,255,255,0.6); }

  /* ── sidebar bottom actions ── */
  .sidebar-actions {
    border-top: 1px solid var(--border);
    padding: 4px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .sidebar-action {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted);
    font-size: 12px; font-family: var(--font);
    padding: 6px 10px; border-radius: 4px;
    text-align: left;
  }
  .sidebar-action:hover { background: var(--surface2); color: var(--text); }
  .sidebar-action[disabled] { opacity: 0.4; cursor: default; }
  .sidebar-action[disabled]:hover { background: none; color: var(--text-muted); }
  .sidebar-version {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.6;
    user-select: none;
    margin-left: auto;
  }

  /* ── SVG icons ── */
  .icon {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
    opacity: 0.65;
  }
  .icon-btn:hover .icon { opacity: 0.95; }

  /* ── icon button ── */
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px; border-radius: 3px;
    line-height: 1; transition: color 0.15s, background 0.15s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }

  /* ── notes list panel ── */
  .notes-panel {
    width: 280px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .notes-panel-header {
    height: 41px;
    padding: 0 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  #folder-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .notebook-lock { width: 12px; height: 12px; color: var(--text-muted); flex-shrink: 0; }
  .notes-list { flex: 1; overflow-y: auto; }
  .item-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-item);
    transition: background 0.1s;
  }
  .item-row .item-icon { margin-top: 1px; }
  .item-row:hover { background: var(--surface2); }
  .item-row.active { background: rgba(124,106,247,0.15); border-left: 2px solid var(--accent); padding-left: 10px; }
  .item-icon { flex-shrink: 0; line-height: 1; display: flex; align-items: center; }
  .item-body { flex: 1; min-width: 0; }
  .item-title-row { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .item-title { flex: 1; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-date { font-size: 11px; color: var(--text-muted); flex-shrink: 0; opacity: 0.7; }
  .item-preview {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-row.is-folder .item-title { font-weight: 500; }
  .item-chevron {
    flex-shrink: 0;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    margin-top: 1px;
  }
  .item-chevron .icon { width: 14px; height: 14px; }
  .item-row.is-folder:hover .item-chevron .icon { opacity: 0.95; }
  .empty-state { padding: 24px 12px; text-align: center; color: var(--text-muted); font-size: 12px; }
  .folder-up-btn { color: var(--text-muted); }
  .folder-up-btn:hover { color: var(--text); }

  /* ── editor ── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .editor-toolbar {
    height: 41px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  #note-title-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font);
  }
  #note-title-input::placeholder { color: var(--text-muted); font-weight: 400; }
  .save-btn {
    background: var(--accent); border: none; color: #fff;
    padding: 5px 12px; border-radius: 5px; cursor: pointer;
    font-size: 12px; font-weight: 600;
    transition: background 0.15s, opacity 0.15s;
  }
  .save-btn:hover { background: var(--accent-hover); }
  .save-btn:disabled { opacity: 0.4; cursor: default; }
  .save-status { font-size: 11px; color: var(--text-muted); }
  .note-rev { font-family: var(--mono); font-size: 11px; color: var(--text-muted); opacity: 0.6; user-select: none; }

  /* ── conflict / save-error banner ── */
  .conflict-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(212,167,44,0.12);
    border-bottom: 1px solid rgba(212,167,44,0.35);
    font-size: 12px;
    color: #d4a72c;
    flex-shrink: 0;
  }
  .conflict-banner .conflict-msg { flex: 1; }
  .conflict-banner .btn { padding: 4px 10px; font-size: 12px; }
  .conflict-banner.error {
    background: rgba(224,92,92,0.1);
    border-bottom-color: rgba(224,92,92,0.35);
    color: var(--danger);
  }

  /* ── overflow menu ── */
  .overflow-wrap { position: relative; }
  .overflow-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    min-width: 140px;
    z-index: 50;
    padding: 4px 0;
  }
  .overflow-menu.open { display: block; }
  .overflow-menu button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
  }
  .overflow-menu button:hover { background: var(--surface2); }
  .overflow-menu button.danger { color: var(--danger); }
  .overflow-menu button.danger:hover { background: rgba(224,92,92,0.1); }

  #editor {
    flex: 1;
    resize: none;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    padding: 20px 24px;
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.7;
    overflow-y: auto;
  }
  #editor::placeholder { color: var(--text-muted); font-family: var(--font); }

  #preview {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.7;
  }
  #preview h1 { font-size: 1.8em; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  #preview h2 { font-size: 1.4em; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
  #preview h3 { font-size: 1.15em; margin: 0.5em 0 0.3em; }
  #preview h4, #preview h5, #preview h6 { font-size: 1em; margin: 0.4em 0 0.2em; }
  #preview p { margin: 0.5em 0; }
  #preview pre { background: var(--surface); padding: 12px 16px; border-radius: 6px; overflow-x: auto; margin: 0.6em 0; }
  #preview code { font-family: var(--mono); font-size: 0.9em; }
  #preview :not(pre) > code { background: var(--surface2); padding: 2px 5px; border-radius: 3px; }
  #preview blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text-muted); margin: 0.5em 0; }
  #preview ul, #preview ol { padding-left: 1.5em; margin: 0.4em 0; }
  #preview li { margin: 0.15em 0; }
  #preview li > input[type="checkbox"] { margin-right: 0.4em; }
  #preview a { color: var(--accent); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
  #preview img { max-width: 100%; border-radius: 6px; }
  #preview table { border-collapse: collapse; margin: 0.6em 0; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 6px 12px; }
  #preview th { background: var(--surface); }

  /* ── modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    width: 320px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .modal h3 { font-size: 14px; margin-bottom: 14px; }
  .modal input, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 5px;
    font-size: 13px; font-family: var(--font); outline: none;
    margin-bottom: 12px;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .modal-choice {
    display: flex; flex-direction: column; gap: 2px;
    padding: 10px 12px; border-radius: 6px;
    background: var(--bg); border: 1px solid var(--border);
    cursor: pointer; text-align: left; color: var(--text);
  }
  .modal-choice:hover { border-color: var(--accent); }
  .modal-choice-title { font-size: 13px; font-weight: 500; }
  .modal-choice-desc { font-size: 11px; color: var(--text-muted); }
  .btn { padding: 6px 14px; border-radius: 5px; font-size: 13px; cursor: pointer; border: none; font-family: var(--font); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text-muted); }

  /* ── connect panel ── */
  #connect-panel {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    flex-direction: column; gap: 12px;
  }
  #connect-panel h2 { font-size: 18px; margin-bottom: 4px; }
  #connect-panel p { font-size: 13px; color: var(--text-muted); }
  #connect-panel input {
    width: 300px; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: 6px;
    font-size: 13px; font-family: var(--font); outline: none;
  }
  #connect-panel input:focus { border-color: var(--accent); }
  #connect-error { color: var(--danger); font-size: 12px; min-height: 16px; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── back button (hidden on desktop) ── */
  .back-btn {
    display: none;
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 13px; font-family: var(--font);
    padding: 2px 6px; margin-right: 4px; border-radius: 3px;
  }
  .back-btn:hover { background: var(--surface2); }

  /* ── mobile responsive ── */
  @media (max-width: 640px) {
    .back-btn { display: inline-flex; align-items: center; }

    .layout { position: relative; }
    .resizer { display: none; }
    body.sidebar-collapsed .sidebar { display: flex; }
    #sidebar-expand-btn { display: none !important; }
    .sidebar-section .icon-btn { display: none; }
    .sidebar, .notes-panel, .editor-panel {
      position: absolute;
      inset: 0;
      width: 100% !important;
      border: none !important;
      transition: transform 0.2s ease;
    }

    /* Default: sidebar visible, others off-screen right */
    .sidebar  { transform: translateX(0); z-index: 3; }
    .notes-panel { transform: translateX(100%); z-index: 2; }
    .editor-panel { transform: translateX(100%); z-index: 1; }

    /* View: notes-list */
    .layout[data-view="notes"] .sidebar { transform: translateX(-100%); }
    .layout[data-view="notes"] .notes-panel { transform: translateX(0); }
    .layout[data-view="notes"] .editor-panel { transform: translateX(100%); }

    /* View: editor */
    .layout[data-view="editor"] .sidebar { transform: translateX(-100%); }
    .layout[data-view="editor"] .notes-panel { transform: translateX(-100%); }
    .layout[data-view="editor"] .editor-panel { transform: translateX(0); }

    header h1 { font-size: 16px; }
    #ship-label { font-size: 12px; }

    .sidebar-section { font-size: 11px; height: 44px; padding: 0 12px; }
    .nb-item { font-size: 16px; padding: 10px 12px; }
    .nb-item .nb-icon .icon { width: 18px; height: 18px; }
    .sidebar-action { font-size: 14px; padding: 10px 12px; gap: 10px; }

    .notes-panel-header { height: 44px; font-size: 14px; padding: 0 12px; }
    .item-row { padding: 14px 12px; gap: 12px; }
    .item-icon .icon { width: 18px; height: 18px; }
    .item-title { font-size: 16px; }
    .item-date { font-size: 13px; }
    .item-preview { font-size: 14px; }
    .empty-state { font-size: 14px; }

    .editor-toolbar { height: 44px; padding: 0 10px; gap: 6px; }
    #note-title-input { font-size: 17px; min-width: 0; }
    #editor { padding: 16px 14px; font-size: 15px; line-height: 1.6; }
    #preview { padding: 16px 14px; font-size: 15px; }

    .sidebar { overflow-y: auto; }
    .notes-panel { overflow-y: auto; }

    .modal { width: calc(100vw - 32px); max-width: 320px; }
  }
</style>
</head>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let BASE_URL = "";
let SHIP = "";
let channelId = "";
let eventSource = null;
let msgId = 1;

let notebooks = {};   // id -> notebook
let folders = {};     // id -> folder
let notes = {};       // id -> note
let publishedIds = new Set();  // set of published note IDs

let activeNotebookId = null;   // numeric id
let activeNotebookFlag = null; // "~ship/name" for scry paths
let activeFolderId = null;
let activeNoteId = null;
let dirty = false;
let savedRevision = 0;

// ── Connect ────────────────────────────────────────────────────────────────
async function connect() {
  const url = document.getElementById("ship-url-input").value.trim().replace(/\/$/, "");
  const code = document.getElementById("auth-input").value.trim();
  const errEl = document.getElementById("connect-error");
  const panel = document.getElementById("connect-panel");
  errEl.textContent = "";

  function fail(msg) { errEl.textContent = msg; panel.style.display = ""; }

  if (!url) { fail("Enter a URL"); return; }
  BASE_URL = url;

  // Optionally authenticate with +code
  if (code) {
    try {
      const params = new URLSearchParams({ password: code });
      const r = await fetch(`${BASE_URL}/~/login`, {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
      });
      if (!r.ok && r.status !== 204) throw new Error(`Login failed: ${r.status}`);
    } catch(e) {
      fail(e.message); return;
    }
  }

  // Get ship name
  try {
    const r = await fetch(`${BASE_URL}/~/scry/notes/v0/notebooks.json`, { credentials: "include" });
    if (r.status === 403) { fail("Auth failed — check your +code"); return; }
    if (!r.ok && r.status !== 404) { fail(`Cannot reach ship: ${r.status}`); return; }
  } catch(e) { fail(`Cannot reach ship: ${e.message}`); return; }

  // Get own ship name
  try {
    const r = await fetch(`${BASE_URL}/~/name`, { credentials: "include" });
    if (r.ok) SHIP = (await r.text()).trim();
  } catch(e) {}

  document.getElementById("connect-panel").style.display = "none";
  setConnectionState("connected");

  openChannel();
  await loadNotebooks();
  await loadPublished();
  await restoreSelection();
  maybeShowDisclaimer();
}

function saveSelection() {
  localStorage.setItem('notes-selection', JSON.stringify({
    notebookId: activeNotebookId,
    folderId: activeFolderId,
    noteId: activeNoteId,
  }));
}

async function restoreSelection() {
  try {
    const saved = JSON.parse(localStorage.getItem('notes-selection') || '{}');
    if (saved.notebookId && notebooks[saved.notebookId]) {
      await selectNotebook(saved.notebookId);
      if (saved.folderId && folders[saved.folderId]) {
        activeFolderId = saved.folderId;
        renderItems();
      }
      if (saved.noteId && notes[saved.noteId]) {
        await selectNote(saved.noteId);
      }
    }
  } catch {}
}

// ── Eyre Channel ──────────────────────────────────────────────────────────
function openChannel() {
  channelId = `notes-ui-${Date.now()}`;
}

let activeSubscriptionId = null;

async function subscribeEvents() {
  if (!activeNotebookFlag) return;
  // Unsubscribe from previous notebook if any
  if (activeSubscriptionId !== null) {
    await poke([{
      id: msgId++, action: "unsubscribe",
      subscription: activeSubscriptionId
    }]);
    activeSubscriptionId = null;
  }
  // Subscribe to this notebook's stream
  const subId = msgId++;
  activeSubscriptionId = subId;
  await poke([{
    id: subId, action: "subscribe",
    ship: SHIP.replace("~",""),
    app: "notes", path: `/v0/notes/${activeNotebookFlag}/stream`
  }]);
  // Start SSE after the channel is created by the PUT
  startSSE();
}

function startSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`${BASE_URL}/~/channel/${channelId}`, { withCredentials: true });
  eventSource.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleEvent(msg);
    } catch {}
  };
  eventSource.onerror = () => { setConnectionState("reconnecting"); };
  eventSource.onopen = () => { setConnectionState("connected"); };
}

async function poke(actions) {
  await fetch(`${BASE_URL}/~/channel/${channelId}`, {
    method: "PUT",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(actions)
  });
}

async function pokeAction(action) {
  const id = msgId++;
  // Include _flag for unambiguous notebook routing across ships
  if (activeNotebookFlag) {
    action._flag = activeNotebookFlag;
  }
  await poke([{
    id, action: "poke",
    ship: SHIP.replace("~",""),
    app: "notes",
    mark: "notes-action",
    json: action
  }]);
}

async function scry(path) {
  const r = await fetch(`${BASE_URL}/~/scry/notes${path}.json`, { credentials: "include" });
  if (!r.ok) return null;
  return r.json();
}

// ── Event Handling ────────────────────────────────────────────────────────
function handleEvent(msg) {
  if (!msg.json) return;
  const data = msg.json;

  // Handle response envelope from /stream subscription
  if (data.response === "snapshot") {
    // Full reload on snapshot
    loadNotebooks();
    return;
  }
  if (data.response === "update") {
    const evt = data.update;
    const type = evt.type;
    // Reload relevant data on events
    if (type === "notebook-created" || type === "notebook-renamed" || type === "notebook-visibility-changed") loadNotebooks();
    else if (type === "notebook-deleted") handleNotebookDeleted(evt.notebookId);
    else if (type?.startsWith("folder-")) loadFolders(activeNotebookId);
    else if (type?.startsWith("note-")) {
      loadNotes(activeNotebookId);
      if (type === "note-updated" && evt.noteId === activeNoteId) {
        if (dirty) showConflictBanner("Remote changes detected while you were editing.");
        else loadNote(activeNoteId);
      }
    }
    return;
  }

  // Fallback: try handling as a raw event (backwards compat)
  const type = data.type;
  if (type === "notebook-created" || type === "notebook-renamed" || type === "notebook-visibility-changed") loadNotebooks();
  else if (type === "notebook-deleted") handleNotebookDeleted(data.notebookId);
  else if (type?.startsWith("folder-")) loadFolders(activeNotebookId);
  else if (type?.startsWith("note-")) {
    loadNotes(activeNotebookId);
    if (type === "note-updated" && data.noteId === activeNoteId) {
      if (dirty) showConflictBanner("Remote changes detected while you were editing.");
      else loadNote(activeNoteId);
    }
  }
}

function handleNotebookDeleted(nid) {
  // If the deleted notebook is currently active, clear the view
  if (activeNotebookId === nid) {
    activeNotebookId = null;
    activeNotebookFlag = null;
    activeFolderId = null;
    activeNoteId = null;
    clearEditor();
  }
  loadNotebooks();
}

// ── Load Data ─────────────────────────────────────────────────────────────
// Compound key "~host/flagName|noteId" so publish state is scoped per-notebook
function pubKey(flag, noteId) { return `${flag}|${noteId}`; }
function pubUrl(flag, noteId) { return `${BASE_URL}/notes/pub/${flag}/${noteId}`; }

async function loadPublished() {
  const data = await scry("/v0/published");
  publishedIds = new Set();
  (data || []).forEach(item => {
    const flag = `${item.host}/${item.flagName}`;
    publishedIds.add(pubKey(flag, item.noteId));
  });
}

async function loadNotebooks() {
  const data = await scry("/v0/notebooks");
  if (!data) return;
  notebooks = {};
  (data || []).forEach(entry => {
    const nb = entry.notebook;
    nb.host = entry.host;
    nb.flagName = entry.flagName;
    nb.flag = `${entry.host}/${entry.flagName}`;
    nb.visibility = entry.visibility || 'private';
    notebooks[nb.id] = nb;
  });
  renderNotebooks();
  updateHeader();
}

async function loadFolders(notebookId) {
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/folders/${activeNotebookFlag}`);
  folders = {};
  (data || []).forEach(f => folders[f.id] = f);
  // Default to root folder if no valid folder is selected
  if (!activeFolderId || !folders[activeFolderId]) {
    const rootFolder = Object.values(folders).find(f => f.name === "/");
    activeFolderId = rootFolder ? rootFolder.id : null;
  }
  renderItems();
}

async function loadNotes(notebookId) {
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/notes/${activeNotebookFlag}`);
  notes = {};
  (data || []).forEach(n => notes[n.id] = n);
  renderItems();
}

function rootFolderId() {
  const root = Object.values(folders).find(f => f.name === "/");
  return root ? root.id : null;
}

async function loadNote(noteId) {
  // reload all notes to get fresh data, then update editor if needed
  if (!activeNotebookFlag) return;
  const data = await scry(`/v0/notes/${activeNotebookFlag}`);
  if (!data) return;
  (data || []).forEach(n => notes[n.id] = n);
  const n = notes[noteId];
  if (!n) return;
  if (activeNoteId === n.id) {
    document.getElementById("note-title-input").value = n.title;
    document.getElementById("editor").value = n.bodyMd;
    savedRevision = n.revision;
    clearDirty();
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function renderNotebooks() {
  const el = document.getElementById("notebooks-list");
  el.innerHTML = "";
  const list = Object.values(notebooks);
  if (!list.length) {
    el.innerHTML = '<div class="empty-state" style="padding:20px 12px;font-size:12px">No notebooks yet.<br>Click <strong>Add notebook</strong> below.</div>';
    return;
  }
  list.sort((a,b) => a.title.localeCompare(b.title)).forEach(nb => {
    const div = document.createElement("div");
    div.className = "nb-item" + (nb.id === activeNotebookId ? " active" : "");
    div.innerHTML = `<span class="nb-icon">${icon('notebook')}</span><span class="nb-name">${esc(nb.title)}</span><span class="nb-flag" title="Click to copy flag">${esc(nb.flag)}</span>`;
    div.onclick = () => selectNotebook(nb.id);
    div.querySelector(".nb-flag").onclick = (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(nb.flag);
      const el = e.target;
      const orig = el.textContent;
      el.textContent = "copied!";
      setTimeout(() => el.textContent = orig, 1000);
    };
    el.appendChild(div);
  });
}

function updateHeader() {
  const labelEl = document.getElementById("folder-label");
  const upBtn = document.getElementById("folder-up-btn");
  const newFolderBtn = document.getElementById("new-folder-btn");
  const newNoteBtn = document.getElementById("new-note-btn");
  const settingsWrap = document.getElementById("notebook-settings-wrap");
  if (!activeNotebookId) {
    labelEl.textContent = "Notes";
    upBtn.style.display = "none";
    newFolderBtn.style.display = "none";
    newNoteBtn.style.display = "none";
    settingsWrap.style.display = "none";
    return;
  }
  newFolderBtn.style.display = "";
  newNoteBtn.style.display = "";
  const rootId = rootFolderId();
  const isAtRoot = !activeFolderId || activeFolderId === rootId;
  if (isAtRoot) {
    const nb = notebooks[activeNotebookId];
    labelEl.textContent = nb?.title || "Notes";
    upBtn.style.display = "none";
    settingsWrap.style.display = "";
    // Show rename/delete + visibility toggle for local notebooks, leave for remote.
    // Normalize by stripping tildes — `/~/name` and scot %p aren't guaranteed to match formats.
    const isLocal = nb && SHIP && nb.host.replace(/^~/, "") === SHIP.replace(/^~/, "");
    document.getElementById("nb-menu-rename").style.display = isLocal ? "" : "none";
    document.getElementById("nb-menu-delete").style.display = isLocal ? "" : "none";
    document.getElementById("nb-menu-leave").style.display = isLocal ? "none" : "";
    const visBtn = document.getElementById("nb-menu-visibility");
    if (isLocal) {
      visBtn.style.display = "";
      visBtn.textContent = nb.visibility === "public" ? "Make private" : "Make public";
    } else {
      visBtn.style.display = "none";
    }
    // Lock indicator when private
    const lockEl = document.getElementById("notebook-lock");
    lockEl.style.display = (nb && nb.visibility === "private") ? "" : "none";
  } else {
    labelEl.textContent = folders[activeFolderId]?.name || "Folder";
    upBtn.style.display = "";
    settingsWrap.style.display = "none";
    document.getElementById("notebook-lock").style.display = "none";
  }
}

function renderItems() {
  updateHeader();
  const el = document.getElementById("notes-list");
  el.innerHTML = "";
  if (!activeNotebookId || !activeFolderId) return;

  const subfolders = Object.values(folders)
    .filter(f => f.parentFolderId === activeFolderId && f.name !== "/")
    .sort((a,b) => a.name.localeCompare(b.name));

  const notesHere = Object.values(notes)
    .filter(n => n.folderId === activeFolderId)
    .sort((a,b) => b.updatedAt - a.updatedAt);

  if (!subfolders.length && !notesHere.length) {
    el.innerHTML = "<div class=\"empty-state\">Empty folder</div>";
    return;
  }

  subfolders.forEach(f => {
    const div = document.createElement("div");
    div.className = "item-row is-folder";
    div.innerHTML = `
      <span class="item-icon">${icon('folder')}</span>
      <div class="item-body">
        <div class="item-title">${esc(f.name)}</div>
      </div>
      <span class="item-chevron">${icon('chevron-right')}</span>
    `;
    div.onclick = () => navigateToFolder(f.id);
    el.appendChild(div);
  });

  notesHere.forEach(n => {
    const div = document.createElement("div");
    div.className = "item-row is-note" + (n.id === activeNoteId ? " active" : "");
    const d = new Date(n.updatedAt * 1000);
    const dateStr = d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
    const preview = notePreview(n.bodyMd);
    div.innerHTML = `
      <span class="item-icon">${icon('doc')}</span>
      <div class="item-body">
        <div class="item-title-row">
          <div class="item-title">${esc(n.title)}</div>
          <div class="item-date">${dateStr}</div>
        </div>
        <div class="item-preview">${preview ? esc(preview) : "<span style='opacity:0.5'>No content</span>"}</div>
      </div>
    `;
    div.onclick = () => selectNote(n.id);
    el.appendChild(div);
  });
}

async function navigateToFolder(id) {
  if (!await confirmDirty()) return;
  activeFolderId = id;
  activeNoteId = null;
  clearEditor();
  renderItems();
  saveSelection();
}

async function folderUp() {
  if (!activeFolderId) return;
  const f = folders[activeFolderId];
  if (!f) return;
  const rootId = rootFolderId();
  if (activeFolderId === rootId) return;
  await navigateToFolder(f.parentFolderId || rootId);
}

// ── Import ────────────────────────────────────────────────────────────────
// ── Export ───────────────────────────────────────────────────────────────
function sanitizeFilename(name) {
  return String(name).replace(/[\/\\:*?"<>|]/g, "_").replace(/^\.+$/g, "_").slice(0, 120) || "Untitled";
}

// Minimal "store" (uncompressed) ZIP encoder — no external deps.
function crc32(data) {
  if (!crc32.table) {
    const t = new Uint32Array(256);
    for (let n = 0; n < 256; n++) {
      let c = n;
      for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
      t[n] = c;
    }
    crc32.table = t;
  }
  let c = 0xffffffff;
  for (let i = 0; i < data.length; i++) c = crc32.table[(c ^ data[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}

function buildZip(entries) {
  const encoder = new TextEncoder();
  const parts = [];
  const central = [];
  let offset = 0;
  for (const e of entries) {
    const name = encoder.encode(e.name);
    const crc = crc32(e.data);
    const size = e.data.length;
    const lh = new Uint8Array(30 + name.length);
    const lv = new DataView(lh.buffer);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0x0800, true);
    lv.setUint16(8, 0, true);
    lv.setUint16(10, 0, true);
    lv.setUint16(12, 0x21, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true);
    lv.setUint32(22, size, true);
    lv.setUint16(26, name.length, true);
    lv.setUint16(28, 0, true);
    lh.set(name, 30);
    parts.push(lh, e.data);

    const ch = new Uint8Array(46 + name.length);
    const cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0x0800, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0x21, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, name.length, true);
    cv.setUint32(42, offset, true);
    ch.set(name, 46);
    central.push(ch);

    offset += lh.length + size;
  }
  const centralOffset = offset;
  const centralSize = central.reduce((s, c) => s + c.length, 0);
  parts.push(...central);

  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, entries.length, true);
  ev.setUint16(10, entries.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  parts.push(eocd);

  const total = parts.reduce((s, p) => s + p.length, 0);
  const out = new Uint8Array(total);
  let o = 0;
  for (const p of parts) { out.set(p, o); o += p.length; }
  return out;
}

async function exportNotebook() {
  closeNotebookSettings();
  if (!activeNotebookId) return;
  const nb = notebooks[activeNotebookId];
  if (!nb) return;
  await loadFolders(activeNotebookId);
  await loadNotes(activeNotebookId);

  const rootId = rootFolderId();
  const pathOf = (fid) => {
    if (!fid || fid === rootId) return "";
    const f = folders[fid];
    if (!f) return "";
    const parent = pathOf(f.parentFolderId);
    return (parent ? parent + "/" : "") + sanitizeFilename(f.name);
  };

  const encoder = new TextEncoder();
  const used = new Set();
  const entries = Object.values(notes).map(note => {
    const folderPath = pathOf(note.folderId);
    const base = sanitizeFilename(note.title || "Untitled");
    let name = (folderPath ? folderPath + "/" : "") + base + ".md";
    let i = 2;
    while (used.has(name)) {
      name = (folderPath ? folderPath + "/" : "") + base + "-" + i + ".md";
      i++;
    }
    used.add(name);
    return { name, data: encoder.encode(note.bodyMd || "") };
  });

  if (!entries.length) { alert("This notebook has no notes to export."); return; }

  const zip = buildZip(entries);
  const blob = new Blob([zip], { type: "application/zip" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = sanitizeFilename(nb.title || "notebook") + ".zip";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function triggerImport(isFolder) {
  if (!activeNotebookId) { alert("Select a notebook first"); return; }
  const input = document.createElement("input");
  input.type = "file";
  if (isFolder) {
    input.webkitdirectory = true;
  } else {
    input.multiple = true;
    input.accept = ".md,.txt,.markdown,.text";
  }
  input.onchange = async (e) => {
    const allFiles = Array.from(e.target.files);
    const mdFiles = allFiles.filter(f => /\.(md|txt|markdown|text)$/i.test(f.name));
    if (!mdFiles.length) { alert("No .md or .txt files found"); return; }
    document.getElementById("save-status").textContent = "Importing " + mdFiles.length + " files…";

    let folderId = activeFolderId;
    if (!folderId) {
      const rootFolder = Object.values(folders).find(f => f.name === "/");
      if (rootFolder) folderId = rootFolder.id;
      else { alert("No folders found"); return; }
    }

    if (isFolder) {
      // Build tree from webkitRelativePath
      const tree = [];
      for (const file of mdFiles) {
        const parts = file.webkitRelativePath.split("/");
        // parts[0] is root folder name, rest are subfolders + filename
        let node = tree;
        // skip parts[0] (selected folder name) and last (filename)
        for (let i = 1; i < parts.length - 1; i++) {
          let existing = node.find(n => n.children && n.name === parts[i]);
          if (!existing) {
            existing = { name: parts[i], children: [] };
            node.push(existing);
          }
          node = existing.children;
        }
        const text = await file.text();
        const title = file.name.replace(/\.(md|txt|markdown|text)$/i, "");
        node.push({ title, bodyMd: text });
      }
      await pokeAction({
        "batch-import-tree": {
          notebookId: activeNotebookId,
          parentFolderId: folderId,
          tree: tree
        }
      });
    } else {
      const noteItems = [];
      for (const file of mdFiles) {
        const text = await file.text();
        const title = file.name.replace(/\.(md|txt|markdown|text)$/i, "");
        noteItems.push({ title, bodyMd: text });
      }
      await pokeAction({
        "batch-import": {
          notebookId: activeNotebookId,
          folderId: folderId,
          notes: noteItems
        }
      });
    }

    setTimeout(async () => {
      await loadFolders(activeNotebookId);
      await loadNotes(activeNotebookId);
      document.getElementById("save-status").textContent = "Imported " + mdFiles.length + " notes";
      setTimeout(() => { document.getElementById("save-status").textContent = ""; }, 3000);
    }, 500);
  };
  document.body.appendChild(input);
  input.click();
  input.remove();
}

// ── Markdown Preview ──────────────────────────────────────────────────────
let previewMode = false;

function togglePreview() {
  previewMode = !previewMode;
  const editor = document.getElementById("editor");
  const preview = document.getElementById("preview");
  const btn = document.getElementById("preview-btn");
  if (previewMode) {
    preview.innerHTML = renderMarkdown(editor.value);
    editor.style.display = "none";
    preview.style.display = "block";
    btn.style.color = "var(--accent)";
  } else {
    editor.style.display = "block";
    preview.style.display = "none";
    btn.style.color = "";
  }
}

function renderMarkdown(src) {
  // escape HTML
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const lines = src.split("\n");
  let html = "";
  let inCode = false, codeLang = "", codeLines = [];
  let inList = false, listType = "";
  let inBlockquote = false;

  function flushList() {
    if (inList) { html += listType === "ul" ? "</ul>\n" : "</ol>\n"; inList = false; }
  }
  function flushBlockquote() {
    if (inBlockquote) { html += "</blockquote>\n"; inBlockquote = false; }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // fenced code blocks
    if (/^```/.test(line)) {
      if (!inCode) {
        flushList(); flushBlockquote();
        codeLang = line.slice(3).trim();
        codeLines = [];
        inCode = true;
        continue;
      } else {
        html += "<pre><code" + (codeLang ? " class=\"language-" + esc(codeLang) + "\"" : "") + ">" + esc(codeLines.join("\n")) + "</code></pre>\n";
        inCode = false;
        continue;
      }
    }
    if (inCode) { codeLines.push(line); continue; }

    // blank line
    if (!line.trim()) { flushList(); flushBlockquote(); html += "\n"; continue; }

    // headings
    const hm = line.match(/^(#{1,6})\s+(.*)/);
    if (hm) { flushList(); flushBlockquote(); const lvl = hm[1].length; html += "<h" + lvl + ">" + inline(hm[2]) + "</h" + lvl + ">\n"; continue; }

    // hr
    if (/^([-*_]\s*){3,}$/.test(line.trim())) { flushList(); flushBlockquote(); html += "<hr>\n"; continue; }

    // blockquote
    if (/^>\s?/.test(line)) {
      flushList();
      const content = line.replace(/^>\s?/, "");
      if (!inBlockquote) { html += "<blockquote>\n"; inBlockquote = true; }
      html += "<p>" + inline(content) + "</p>\n";
      continue;
    } else { flushBlockquote(); }

    // unordered list
    const ulm = line.match(/^(\s*)[-*+]\s+(.*)/);
    if (ulm) {
      if (!inList || listType !== "ul") { flushList(); html += "<ul>\n"; inList = true; listType = "ul"; }
      // checkbox
      const cbm = ulm[2].match(/^\[([ xX])\]\s*(.*)/);
      if (cbm) {
        const checked = cbm[1] !== " " ? " checked disabled" : " disabled";
        html += "<li><input type=\"checkbox\"" + checked + "> " + inline(cbm[2]) + "</li>\n";
      } else {
        html += "<li>" + inline(ulm[2]) + "</li>\n";
      }
      continue;
    }

    // ordered list
    const olm = line.match(/^(\s*)\d+[.)]\s+(.*)/);
    if (olm) {
      if (!inList || listType !== "ol") { flushList(); html += "<ol>\n"; inList = true; listType = "ol"; }
      html += "<li>" + inline(olm[2]) + "</li>\n";
      continue;
    }

    flushList();
    // table
    if (line.includes("|") && i + 1 < lines.length && /^[\s|:-]+$/.test(lines[i + 1])) {
      const parseRow = r => r.split("|").map(c => c.trim()).filter(c => c !== "");
      const headers = parseRow(line);
      html += "<table><thead><tr>" + headers.map(h => "<th>" + inline(h) + "</th>").join("") + "</tr></thead><tbody>\n";
      i++; // skip separator
      while (i + 1 < lines.length && lines[i + 1].includes("|")) {
        i++;
        const cells = parseRow(lines[i]);
        html += "<tr>" + cells.map(c => "<td>" + inline(c) + "</td>").join("") + "</tr>\n";
      }
      html += "</tbody></table>\n";
      continue;
    }

    // paragraph
    html += "<p>" + inline(line) + "</p>\n";
  }
  if (inCode) html += "<pre><code>" + esc(codeLines.join("\n")) + "</code></pre>\n";
  flushList(); flushBlockquote();
  return html;
}

function inline(s) {
  const esc = t => t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // inline code first (to protect contents)
  let result = "";
  let rest = s;
  while (rest) {
    const cm = rest.match(/`([^`]+)`/);
    if (!cm) { result += rest; break; }
    result += rest.slice(0, cm.index);
    result += "<code>" + esc(cm[1]) + "</code>";
    rest = rest.slice(cm.index + cm[0].length);
  }
  s = result;
  // images before links
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, "<img src=\"$2\" alt=\"$1\">");
  // links
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, "<a href=\"$2\" target=\"_blank\">$1</a>");
  // bold+italic
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  s = s.replace(/___(.+?)___/g, "<strong><em>$1</em></strong>");
  // bold
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/__(.+?)__/g, "<strong>$1</strong>");
  // italic
  s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
  s = s.replace(/_(.+?)_/g, "<em>$1</em>");
  // strikethrough
  s = s.replace(/~~(.+?)~~/g, "<del>$1</del>");
  return s;
}

// ── Selection ─────────────────────────────────────────────────────────────
async function selectNotebook(id) {
  if (!await confirmDirty()) return;
  activeNotebookId = id;
  const nb = notebooks[id];
  activeNotebookFlag = nb ? nb.flag : null;
  activeFolderId = null;  // loadFolders will set this to root folder id
  activeNoteId = null;
  clearEditor();
  renderNotebooks();
  await loadFolders(id);
  await loadNotes(id);
  subscribeEvents();
  saveSelection();
  if (isMobile()) mobileSetView("notes");
}

async function selectNote(id) {
  if (!await confirmDirty()) return;
  dismissConflictBanner();
  activeNoteId = id;
  renderItems();
  const n = notes[id];
  document.getElementById("note-title-input").value = n.title;
  document.getElementById("editor").value = n.bodyMd;
  if (previewMode) document.getElementById("preview").innerHTML = renderMarkdown(n.bodyMd);
  savedRevision = n.revision;
  document.getElementById("note-rev").textContent = `rev ${n.revision}`;
  document.title = `${n.title || "Untitled"} — Notes`;
  clearDirty();
  document.getElementById("overflow-wrap").style.display = "";
  saveSelection();
  // Update publish/unpublish button state
  const isPublished = publishedIds.has(pubKey(activeNotebookFlag, id));
  document.getElementById("publish-btn").style.display = isPublished ? "none" : "";
  document.getElementById("unpublish-btn").style.display = isPublished ? "" : "none";
  document.getElementById("view-published-btn").style.display = isPublished ? "" : "none";
  if (isMobile()) mobileSetView("editor");
}

// ── Create / Save ─────────────────────────────────────────────────────────
async function newNote() {
  if (!activeNotebookId) { alert("Select a notebook first"); return; }
  if (!activeFolderId) { alert("No folder selected"); return; }
  if (!await confirmDirty()) return;

  await pokeAction({
    "create-note": { notebookId: activeNotebookId, folderId: activeFolderId, title: "Untitled", bodyMd: "" }
  });

  // Reload, select the newest note, and focus the editor
  setTimeout(async () => {
    await loadNotes(activeNotebookId);
    const inFolder = Object.values(notes).filter(n => n.folderId === activeFolderId);
    const newest = inFolder.sort((a,b) => b.id - a.id)[0];
    if (newest) {
      await selectNote(newest.id);
      document.getElementById("editor").focus();
    }
  }, 300);
}

// ── Auto-save ────────────────────────────────────────────────────────────
let saveTimer = null;
let saving = false;
let autoCreating = false;
let conflictActive = false;

function onEditorInput() {
  // If the user starts typing with no note selected, auto-create one.
  if (!activeNoteId && !autoCreating) {
    triggerAutoCreate();
    return;
  }
  // While auto-creating, keep accepting keystrokes — editor DOM updates
  // naturally, we'll promote the typed content once the note is ready.
  if (autoCreating) return;

  dirty = true;
  document.getElementById("save-status").textContent = "";
  if (saveTimer) clearTimeout(saveTimer);
  // Don't arm autoSave while a conflict is unresolved — user must resolve first
  if (!conflictActive) saveTimer = setTimeout(() => autoSave(), 1500);
}

async function triggerAutoCreate() {
  const editor = document.getElementById("editor");
  const titleInput = document.getElementById("note-title-input");
  if (!activeNotebookId || !activeFolderId) {
    // Can't create — clear the editor and tell the user.
    editor.value = "";
    titleInput.value = "";
    alert(activeNotebookId ? "No folder selected" : "Select a notebook first");
    return;
  }
  autoCreating = true;
  await pokeAction({
    "create-note": { notebookId: activeNotebookId, folderId: activeFolderId, title: "Untitled", bodyMd: "" }
  });
  setTimeout(async () => {
    // Capture what the user typed during the create roundtrip
    const pendingBody = editor.value;
    const pendingTitle = titleInput.value;
    await loadNotes(activeNotebookId);
    const inFolder = Object.values(notes).filter(n => n.folderId === activeFolderId);
    const newest = inFolder.sort((a,b) => b.id - a.id)[0];
    autoCreating = false;
    if (!newest) return;
    await selectNote(newest.id);
    // selectNote wrote the server-side (empty) values; restore what they typed
    editor.value = pendingBody;
    titleInput.value = pendingTitle;
    editor.focus();
    editor.selectionStart = editor.selectionEnd = editor.value.length;
    dirty = true;
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => autoSave(), 1500);
  }, 300);
}

async function autoSave() {
  if (!activeNoteId || !dirty || saving || conflictActive) return;
  saving = true;
  const title = document.getElementById("note-title-input").value.trim() || "Untitled";
  const body = document.getElementById("editor").value;
  const n = notes[activeNoteId];
  if (!n) { saving = false; return; }

  document.getElementById("save-status").textContent = "Saving\u2026";

  try {
    // Use revision 0 (force-update) for remote notebooks where our
    // local revision may be stale; use real revision for local notebooks
    const nb = notebooks[n.notebookId];
    const isLocal = nb && SHIP && nb.host.replace(/^~/, "") === SHIP.replace(/^~/, "");
    const rev = isLocal ? savedRevision : 0;
    await pokeAction({ "update-note": { notebookId: n.notebookId, noteId: activeNoteId, bodyMd: body, expectedRevision: rev } });
    if (isLocal) savedRevision++;
    if (title !== n.title) {
      await pokeAction({ "rename-note": { notebookId: n.notebookId, noteId: activeNoteId, title } });
    }
    notes[activeNoteId] = { ...n, title, bodyMd: body, revision: savedRevision };
    dirty = false;
    document.getElementById("save-status").textContent = "Saved";
    document.getElementById("note-rev").textContent = `rev ${savedRevision}`;
    document.title = `${title || "Untitled"} — Notes`;
    setTimeout(() => { if (!dirty) document.getElementById("save-status").textContent = ""; }, 2000);
    renderItems();
  } catch(e) {
    document.getElementById("save-status").textContent = "Error saving";
    await handleSaveFailure();
  }
  saving = false;
}

// Inspect the server-side note to determine whether the save failure was
// a revision conflict (someone else updated the note) or a transient issue.
async function handleSaveFailure() {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
  if (!activeNotebookFlag || !activeNoteId) return;
  try {
    const data = await scry(`/v0/notes/${activeNotebookFlag}`);
    const remote = (data || []).find(x => x.id === activeNoteId);
    if (remote && remote.revision > savedRevision) {
      showConflictBanner(`Save failed — remote is now at rev ${remote.revision}. Your changes are preserved.`);
      return;
    }
  } catch(_) {}
  showConflictBanner("Save failed. Click retry, or reload from server to discard your changes.", true);
}

function showConflictBanner(msg, isError) {
  const banner = document.getElementById("conflict-banner");
  banner.style.display = "flex";
  banner.classList.toggle("error", !!isError);
  document.getElementById("conflict-msg").textContent = msg;
  document.getElementById("conflict-keep").textContent = isError ? "Retry" : "Keep mine";
  document.getElementById("conflict-use").textContent = isError ? "Reload" : "Use remote";
  // Block auto-save until the user resolves
  conflictActive = true;
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
}

function dismissConflictBanner() {
  const banner = document.getElementById("conflict-banner");
  if (!banner) return;
  banner.style.display = "none";
  banner.classList.remove("error");
  conflictActive = false;
}

async function resolveConflictKeepMine() {
  // Force-save: bypass revision check by loading the latest rev, then saving
  dismissConflictBanner();
  if (!activeNoteId) return;
  try {
    const data = await scry(`/v0/notes/${activeNotebookFlag}`);
    const remote = (data || []).find(x => x.id === activeNoteId);
    if (remote) savedRevision = remote.revision;  // adopt remote rev
  } catch(_) {}
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => autoSave(), 50);
}

async function resolveConflictUseRemote() {
  dismissConflictBanner();
  if (!activeNoteId) return;
  dirty = false;
  await loadNote(activeNoteId);
}

// keep ctrl+s as a force-save
async function saveNote() { if (saveTimer) clearTimeout(saveTimer); await autoSave(); }

async function publishNote() {
  closeOverflow();
  if (!activeNoteId || !activeNotebookId) return;
  const n = notes[activeNoteId];
  if (!n) return;

  // Save first if dirty
  if (dirty) await autoSave();

  const body = document.getElementById("editor").value;
  const html = publishTemplate(n.title || "Untitled", renderMarkdown(body));

  await pokeAction({
    "publish-note": { notebookId: activeNotebookId, noteId: activeNoteId, html }
  });

  const url = pubUrl(activeNotebookFlag, activeNoteId);
  publishedIds.add(pubKey(activeNotebookFlag, activeNoteId));
  document.getElementById("publish-btn").style.display = "none";
  document.getElementById("unpublish-btn").style.display = "";
  document.getElementById("view-published-btn").style.display = "";
  window.open(url, '_blank');
}

async function unpublishNote() {
  closeOverflow();
  if (!activeNoteId || !activeNotebookId) return;

  await pokeAction({
    "unpublish-note": { notebookId: activeNotebookId, noteId: activeNoteId }
  });

  publishedIds.delete(pubKey(activeNotebookFlag, activeNoteId));
  document.getElementById("publish-btn").style.display = "";
  document.getElementById("unpublish-btn").style.display = "none";
  document.getElementById("view-published-btn").style.display = "none";
}

function viewPublished() {
  if (!activeNoteId || !activeNotebookFlag) return;
  window.open(pubUrl(activeNotebookFlag, activeNoteId), '_blank');
}

// ── Dirty state ──────────────────────────────────────────────────────────
function clearDirty() {
  dirty = false;
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
}

async function confirmDirty() {
  if (!dirty) return true;
  // Try to save first
  await autoSave();
  return true;
}

function clearEditor() {
  document.getElementById("note-title-input").value = "";
  document.getElementById("editor").value = "";
  document.getElementById("note-rev").textContent = "";
  document.getElementById("overflow-wrap").style.display = "none";
  document.title = "Notes";
  dismissConflictBanner();
  clearDirty();
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal(type) {
  const box = document.getElementById("modal-box");
  const backdrop = document.getElementById("modal-backdrop");

  if (type === "alpha-disclaimer") {
    modalLocked = true;
    box.innerHTML = `
      <h3>Heads up — alpha software</h3>
      <p style="font-size:13px;line-height:1.6;margin-bottom:12px;color:var(--text-muted)">
        Notes is early-stage alpha. Bugs are very likely, and some of them could cause
        <strong style="color:var(--text)">catastrophic, unrecoverable data loss</strong>.
      </p>
      <p style="font-size:13px;line-height:1.6;margin-bottom:16px;color:var(--text-muted)">
        Keep backups of anything irreplaceable. Don't rely on this as your only copy
        of important notes yet.
      </p>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="acknowledgeDisclaimer()">I understand</button>
      </div>
    `;
  } else if (type === "desktop-sync") {
    box.innerHTML = `
      <h3>Desktop sync app</h3>
      <p style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:14px">
        A menubar app that keeps your notes mirrored to a folder of <code>.md</code> files on your Mac,
        so you can read and edit them with any Markdown editor.
      </p>
      <p style="font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:14px;opacity:0.8">
        Downloads coming soon — check
        <a href="https://github.com/arthyn/notes-prototype/releases" target="_blank" style="color:var(--accent)">GitHub Releases</a>
        for the latest .dmg.
      </p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      </div>
    `;
  } else if (type === "add-notebook") {
    box.innerHTML = `
      <h3>Add Notebook</h3>
      <div class="modal-choices">
        <button class="modal-choice" onclick="openModal('new-notebook')">
          <span class="modal-choice-title">Create new</span>
          <span class="modal-choice-desc">Start a fresh notebook</span>
        </button>
        <button class="modal-choice" onclick="openModal('join-notebook')">
          <span class="modal-choice-title">Join existing</span>
          <span class="modal-choice-desc">Enter a flag to join a shared notebook</span>
        </button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    `;
  } else if (type === "new-notebook") {
    box.innerHTML = `
      <h3>New Notebook</h3>
      <input id="m-title" type="text" placeholder="Notebook title" autofocus />
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createNotebook()">Create</button>
      </div>
    `;
    box.querySelector("#m-title").addEventListener("keydown", e => { if (e.key==="Enter") createNotebook(); });
  } else if (type === "join-notebook") {
    box.innerHTML = `
      <h3>Join Notebook</h3>
      <input id="m-flag" type="text" placeholder="~sampel-palnet/notebook-name" autofocus />
      <div style="font-size:11px;color:var(--text-muted);margin:6px 0">Enter the flag shared by the notebook host</div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="joinNotebook()">Join</button>
      </div>
    `;
    box.querySelector("#m-flag").addEventListener("keydown", e => { if (e.key==="Enter") joinNotebook(); });
  } else if (type === "rename-notebook") {
    if (!activeNotebookId) return;
    const nb = notebooks[activeNotebookId];
    if (!nb) return;
    box.innerHTML = `
      <h3>Rename Notebook</h3>
      <input id="m-title" type="text" value="${esc(nb.title)}" autofocus />
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="renameNotebook()">Rename</button>
      </div>
    `;
    box.querySelector("#m-title").addEventListener("keydown", e => { if (e.key==="Enter") renameNotebook(); });
  } else if (type === "new-folder") {
    if (!activeNotebookId) { alert("Select a notebook first"); return; }
    const rootId = rootFolderId();
    const isAtRoot = !activeFolderId || activeFolderId === rootId;
    const folderOpts = Object.values(folders)
      .filter(f => f.name !== "/")
      .map(f => `<option value="${f.id}"${f.id === activeFolderId ? " selected" : ""}>${esc(f.name)}</option>`)
      .join("");
    box.innerHTML = `
      <h3>New Folder</h3>
      <input id="m-name" type="text" placeholder="Folder name" autofocus />
      <select id="m-parent">
        <option value=""${isAtRoot ? " selected" : ""}>Root level</option>
        ${folderOpts}
      </select>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createFolder()">Create</button>
      </div>
    `;
  }

  backdrop.classList.add("open");
  setTimeout(() => box.querySelector("input")?.focus(), 50);
}

let modalLocked = false;
function closeModal(e) {
  if (modalLocked) return;
  if (e && e.target !== document.getElementById("modal-backdrop")) return;
  document.getElementById("modal-backdrop").classList.remove("open");
}

async function createNotebook() {
  const title = document.getElementById("m-title")?.value?.trim();
  if (!title) return;
  document.getElementById("modal-backdrop").classList.remove("open");
  await pokeAction({ "create-notebook": title });
  setTimeout(() => loadNotebooks(), 300);
}

function openRenameNotebook() {
  closeNotebookSettings();
  if (!activeNotebookId) return;
  openModal("rename-notebook");
}

async function renameNotebook() {
  const title = document.getElementById("m-title")?.value?.trim();
  if (!title || !activeNotebookId) return;
  document.getElementById("modal-backdrop").classList.remove("open");
  await pokeAction({ "rename-notebook": { notebookId: activeNotebookId, title } });
  setTimeout(() => loadNotebooks(), 300);
}

async function deleteNotebook() {
  closeNotebookSettings();
  if (!activeNotebookId) return;
  const nb = notebooks[activeNotebookId];
  if (!nb) return;
  if (!confirm(`Delete notebook "${nb.title}"? This cannot be undone.`)) return;
  await pokeAction({ "delete-notebook": { notebookId: activeNotebookId } });
  activeNotebookId = null;
  activeNotebookFlag = null;
  activeFolderId = null;
  activeNoteId = null;
  clearEditor();
  setTimeout(async () => {
    await loadNotebooks();
    renderItems();
  }, 300);
}

async function toggleNotebookVisibility() {
  closeNotebookSettings();
  if (!activeNotebookId) return;
  const nb = notebooks[activeNotebookId];
  if (!nb) return;
  const next = nb.visibility === "public" ? "private" : "public";
  await pokeAction({ "set-visibility": { notebookId: activeNotebookId, visibility: next } });
  // Optimistic local update
  nb.visibility = next;
  updateHeader();
  // One-time hint the first time a notebook is made public
  if (next === "public") {
    try {
      if (!localStorage.getItem("public-flag-hint")) {
        localStorage.setItem("public-flag-hint", "1");
        setTimeout(() => alert("Notebook is public. Share the flag shown under the notebook name in the sidebar so others can join."), 300);
      }
    } catch(_) {}
  }
}

async function leaveRemoteNotebook() {
  closeNotebookSettings();
  if (!activeNotebookId || !activeNotebookFlag) return;
  const nb = notebooks[activeNotebookId];
  if (!nb) return;
  if (!confirm(`Leave notebook "${nb.title}"?`)) return;
  const slash = activeNotebookFlag.indexOf("/");
  const ship = activeNotebookFlag.slice(0, slash);
  const name = activeNotebookFlag.slice(slash + 1);
  await pokeAction({ "leave-remote": { ship, name } });
  activeNotebookId = null;
  activeNotebookFlag = null;
  activeFolderId = null;
  activeNoteId = null;
  clearEditor();
  setTimeout(async () => {
    await loadNotebooks();
    renderItems();
  }, 300);
}

async function joinNotebook() {
  const flag = document.getElementById("m-flag")?.value?.trim();
  if (!flag || !flag.includes("/")) return;
  const parts = flag.split("/");
  const ship = parts[0].startsWith("~") ? parts[0] : "~" + parts[0];
  const name = parts.slice(1).join("/");
  document.getElementById("modal-backdrop").classList.remove("open");
  await pokeAction({ "join-remote": { ship, name } });
  setTimeout(() => loadNotebooks(), 2000);
}

async function createFolder() {
  const name = document.getElementById("m-name")?.value?.trim();
  const parentVal = document.getElementById("m-parent")?.value;
  if (!name) return;
  document.getElementById("modal-backdrop").classList.remove("open");

  // Find root folder if no parent selected
  let parentFolderId = parentVal ? parseInt(parentVal) : null;
  if (!parentFolderId) {
    const rootFolder = Object.values(folders).find(f => f.name === "/");
    parentFolderId = rootFolder ? rootFolder.id : null;
  }

  await pokeAction({
    "create-folder": {
      notebookId: activeNotebookId,
      parentFolderId: parentFolderId,
      name
    }
  });
  setTimeout(() => loadFolders(activeNotebookId), 300);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "s") {
    e.preventDefault();
    if (dirty) saveNote();
  } else if ((e.metaKey || e.ctrlKey) && e.altKey && (e.key === "n" || e.key === "N" || e.code === "KeyN")) {
    // Cmd/Ctrl+Alt+N — browsers don't intercept this combo
    if (activeNotebookId && activeFolderId) {
      e.preventDefault();
      newNote();
    }
  }
});

// ── Mobile Navigation ────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 640; }

function mobileSetView(view) {
  document.querySelector(".layout").setAttribute("data-view", view);
}

function mobileBack(to) {
  if (to === "notebooks") mobileSetView("notebooks");
  else if (to === "notes") mobileSetView("notes");
}

// ── Util ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
const DISCLAIMER_KEY = "alpha-disclaimer-acknowledged";
function maybeShowDisclaimer() {
  try {
    if (localStorage.getItem(DISCLAIMER_KEY) === "1") return;
  } catch(_) { return; }
  openModal("alpha-disclaimer");
}
function acknowledgeDisclaimer() {
  try { localStorage.setItem(DISCLAIMER_KEY, "1"); } catch(_) {}
  modalLocked = false;
  document.getElementById("modal-backdrop").classList.remove("open");
}

function setConnectionState(state) {
  const el = document.getElementById("conn-label");
  if (!el) return;
  el.classList.remove("reconnecting", "disconnected");
  if (state === "reconnecting") {
    el.textContent = "Reconnecting…";
    el.classList.add("reconnecting");
  } else if (state === "disconnected") {
    el.textContent = "Disconnected";
    el.classList.add("disconnected");
  } else {
    el.textContent = "Notebooks";
  }
}
function icon(id) {
  return `<svg class="icon"><use href="#i-${id}"/></svg>`;
}
function notePreview(bodyMd) {
  if (!bodyMd) return "";
  // Strip common markdown syntax, collapse whitespace, trim.
  const s = String(bodyMd)
    .slice(0, 400)
    .replace(/^#{1,6}\s+/gm, "")
    .replace(/^[>\-*+]\s+/gm, "")
    .replace(/!\[([^\]]*)\]\([^)]+\)/g, "$1")
    .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
    .replace(/[*_`~]/g, "")
    .replace(/\s+/g, " ")
    .trim();
  return s.slice(0, 140);
}

// ── Column resizers ──────────────────────────────────────────────────────
const COLUMN_CONSTRAINTS = {
  sidebar:       { min: 160, max: 360 },
  "notes-panel": { min: 200, max: 480 },
};
const EDITOR_MIN_WIDTH = 320;
const WIDTHS_KEY = "notes-column-widths";

function restoreColumnWidths() {
  try {
    const saved = JSON.parse(localStorage.getItem(WIDTHS_KEY) || "{}");
    for (const [cls, w] of Object.entries(saved)) {
      const el = document.querySelector("." + cls);
      const c = COLUMN_CONSTRAINTS[cls];
      if (el && c && typeof w === "number") {
        el.style.width = Math.max(c.min, Math.min(c.max, w)) + "px";
      }
    }
  } catch(_) {}
}

function persistColumnWidths() {
  const out = {};
  for (const cls of Object.keys(COLUMN_CONSTRAINTS)) {
    const el = document.querySelector("." + cls);
    if (el) out[cls] = el.offsetWidth;
  }
  try { localStorage.setItem(WIDTHS_KEY, JSON.stringify(out)); } catch(_) {}
}

function setupResizers() {
  document.querySelectorAll(".resizer").forEach(resizer => {
    const cls = resizer.dataset.target;
    const target = document.querySelector("." + cls);
    const constraint = COLUMN_CONSTRAINTS[cls];
    if (!target || !constraint) return;

    let startX = 0;
    let startWidth = 0;

    const onMove = (e) => {
      const layoutW = document.querySelector(".layout").offsetWidth;
      // Reserve editor min + the other fixed column's current width
      const otherCls = cls === "sidebar" ? "notes-panel" : "sidebar";
      const otherW = document.querySelector("." + otherCls).offsetWidth;
      const maxByLayout = layoutW - otherW - EDITOR_MIN_WIDTH;
      const max = Math.min(constraint.max, maxByLayout);
      const min = constraint.min;
      let next = startWidth + (e.clientX - startX);
      if (next < min) next = min;
      if (next > max) next = max;
      target.style.width = next + "px";
    };

    const onUp = () => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      resizer.classList.remove("dragging");
      document.body.classList.remove("resizing");
      persistColumnWidths();
    };

    resizer.addEventListener("pointerdown", (e) => {
      if (window.innerWidth <= 640) return;
      e.preventDefault();
      startX = e.clientX;
      startWidth = target.offsetWidth;
      resizer.classList.add("dragging");
      document.body.classList.add("resizing");
      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    });
  });
}

function toggleSidebar() {
  document.body.classList.toggle("sidebar-collapsed");
  try {
    localStorage.setItem(
      "sidebar-collapsed",
      document.body.classList.contains("sidebar-collapsed") ? "1" : "0"
    );
  } catch(_) {}
}

function restoreSidebarCollapsed() {
  try {
    if (localStorage.getItem("sidebar-collapsed") === "1") {
      document.body.classList.add("sidebar-collapsed");
    }
  } catch(_) {}
}

restoreSidebarCollapsed();
restoreColumnWidths();
setupResizers();

// Auto-connect when served from a ship
if (location.protocol !== "file:" && location.hostname) {
  // Hide connect panel immediately to avoid flash
  document.getElementById("connect-panel").style.display = "none";
  document.getElementById("ship-url-input").value = location.origin;
  connect().catch(() => {
    // Show connect panel if auto-connect fails
    document.getElementById("connect-panel").style.display = "";
  });
}
